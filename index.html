<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Noite Filmes • Assistir Online</title>
    
    <!-- 9. DEPENDÊNCIAS EXTERNAS -->
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- HLS.js -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
    
    <!-- Estilos Customizados Noite Filmes -->
    <style>
        /* 2. ESTILOS CSS (Classes Principais) */
        :root {
            --bg-dark: #0a0a0f;
            --bg-glass: rgba(20, 20, 30, 0.75);
            --primary: #e50914;
            --text-dim: #a1a1aa;
        }
        
        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Inter', sans-serif;
            padding-bottom: 80px; /* Espaço para nav mobile */
        }
        
        /* Glass Morphism */
        .glass {
            background: var(--bg-glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        
        .glass-card {
            background: rgba(30, 30, 40, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform 0.2s ease;
        }
        
        .glass-card:hover {
            transform: scale(1.02);
            background: rgba(50, 50, 65, 0.7);
            border-color: rgba(229, 9, 20, 0.3);
        }
        
        .ripple-btn {
            position: relative;
            overflow: hidden;
            transform: translate3d(0, 0, 0);
        }
        
        .action-btn {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        
        .action-btn:hover {
            background: var(--primary);
        }
        
        /* Player Wrapper */
        .player-wrapper {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: black;
            z-index: 1000;
            display: none;
        }
        
        /* 8.e Feed Instagram-style (Esboço) */
        .feed-post {
            background: var(--bg-glass);
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid #2a2a3a;
        }
        
        /* Perfil Instagram Layout */
        .profile-header {
            display: flex;
            padding: 20px;
            gap: 30px;
        }
        
        .profile-avatar-lg {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 3px solid var(--primary);
        }
        
        /* Animações */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .section {
            display: none;
            animation: fadeIn 0.3s ease;
        }
        
        .section.active {
            display: block;
        }
        
        /* Light Mode */
        body.light {
            --bg-dark: #f4f4f9;
            --bg-glass: rgba(255, 255, 255, 0.8);
            color: #111;
        }
        
        body.light .text-white { color: #111 !important; }
        body.light .glass { background: rgba(255,255,255,0.7); border-color: #ddd; }
        
        /* Mobile Nav */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background: rgba(10, 10, 15, 0.9);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #333;
            z-index: 50;
        }
        
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #888;
            transition: 0.2s;
        }
        
        .nav-item.active {
            color: var(--primary);
        }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }
        
        /* Media Queries */
        @media (min-width: 768px) {
            .bottom-nav { display: none; }
            body { padding-bottom: 0; }
            .desktop-sidebar { display: flex; }
        }
        
        @media (max-width: 767px) {
            .desktop-sidebar { display: none; }
        }
    </style>
</head>
<body class="bg-[#0a0a0f]">

<!-- 1. ESTRUTURA DO DOCUMENTO HTML: CONTAINERS PRINCIPAIS -->
<div id="app">
    
    <!-- MODAIS LISTADOS NO PROMPT -->
    <div id="loginModal" class="modal"></div>
    <div id="adminModal" class="modal"></div>
    <div id="settingsModal" class="modal"></div>
    <div id="globalSearchModal" class="modal"></div>
    <div id="playerWrapper" class="player-wrapper">
        <div class="absolute top-4 left-4 z-50">
            <button onclick="closePlayer()" class="text-white text-2xl"><i class="fas fa-arrow-left"></i></button>
        </div>
        <video id="mainVideoPlayer" class="w-full h-full object-contain" controls playsinline></video>
        <div id="youtubePlayerContainer" class="w-full h-full hidden"></div>
    </div>

    <!-- LAYOUT DESKTOP SIDEBAR -->
    <div class="desktop-sidebar fixed left-0 top-0 h-full w-64 glass p-6 flex-col gap-6">
        <h1 class="text-2xl font-bold text-red-600 mb-8">NOITE<span class="text-white">FILMES</span></h1>
        <nav class="flex flex-col gap-4">
            <a href="#" onclick="switchSection('filmesSection')" class="flex items-center gap-3 hover:text-red-500"><i class="fas fa-film"></i> Filmes</a>
            <a href="#" onclick="switchSection('seriesSection')" class="flex items-center gap-3 hover:text-red-500"><i class="fas fa-tv"></i> Séries</a>
            <a href="#" onclick="switchSection('canaisSection')" class="flex items-center gap-3 hover:text-red-500"><i class="fas fa-satellite-dish"></i> Canais</a>
            <a href="#" onclick="switchSection('feedSection')" class="flex items-center gap-3 hover:text-red-500"><i class="fas fa-newspaper"></i> Feed</a>
            <a href="#" onclick="switchSection('chatSection')" class="flex items-center gap-3 hover:text-red-500"><i class="fas fa-comments"></i> Chat</a>
            <a href="#" onclick="switchSection('perfilSection')" class="flex items-center gap-3 hover:text-red-500"><i class="fas fa-user"></i> Perfil</a>
        </nav>
    </div>

    <!-- CONTEÚDO PRINCIPAL -->
    <main class="md:ml-64 p-4 md:p-6">
        <!-- SEÇÕES PRINCIPAIS -->
        <div id="filmesSection" class="section active">
            <h2 class="text-2xl font-bold mb-4">🎬 Filmes</h2>
            <div class="flex gap-4 mb-6">
                <input type="text" id="searchInput" placeholder="Buscar filmes..." class="w-full md:w-96 bg-gray-800 rounded-full px-6 py-3 text-white border-none outline-none focus:ring-2 focus:ring-red-600">
                <button onclick="openGlobalSearchModal()" class="bg-red-600 px-4 py-2 rounded-full"><i class="fas fa-search"></i></button>
            </div>
            <div id="contentGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4">
                <!-- Renderizado via JS -->
            </div>
        </div>
        
        <div id="seriesSection" class="section"><h2>Séries</h2><div id="seriesGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4"></div></div>
        <div id="canaisSection" class="section"><h2>Canais Ao Vivo</h2><div id="canaisGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4"></div></div>
        <div id="feedSection" class="section"><div id="feedList" class="max-w-2xl mx-auto"></div></div>
        <div id="chatSection" class="section"><div id="chatBox" class="h-[70vh] flex flex-col glass rounded-xl p-4"></div></div>
        <div id="perfilSection" class="section"><div id="instagramProfileContainer"></div></div>
    </main>
    
    <!-- BOTTOM NAV MOBILE -->
    <div class="bottom-nav md:hidden">
        <div class="nav-item active" onclick="switchSection('filmesSection')"><i class="fas fa-film"></i><span class="text-xs">Filmes</span></div>
        <div class="nav-item" onclick="switchSection('seriesSection')"><i class="fas fa-tv"></i><span class="text-xs">Séries</span></div>
        <div class="nav-item" onclick="switchSection('canaisSection')"><i class="fas fa-satellite-dish"></i><span class="text-xs">Canais</span></div>
        <div class="nav-item" onclick="switchSection('feedSection')"><i class="fas fa-newspaper"></i><span class="text-xs">Feed</span></div>
        <div class="nav-item" onclick="switchSection('perfilSection')"><i class="fas fa-user"></i><span class="text-xs">Perfil</span></div>
    </div>
</div>

<!-- FIREBASE SDK -->
<script type="module">
    // 5. CONFIGURAÇÕES E CONSTANTES
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, get, child, push, update, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    
    // ATENÇÃO: Substitua pela sua config do Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyAXQ_3yaVR6TgsAha6nU7uihHdd8NvrP78",
            authDomain: "noitefilmes26.firebaseapp.com",
            projectId: "noitefilmes26",
            storageBucket: "noitefilmes26.firebasestorage.app",
            messagingSenderId: "654439850210",
            appId: "1:654439850210:web:6f00af60cde262aafcbebb",
            measurementId: "G-Q9DCCZTQH9"
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);
    
    // 4. VARIÁVEIS GLOBAIS
    window.currentUser = null;
    window.filmes = [];
    window.series = [];
    window.canais = [];
    window.currentMedia = null;
    window.currentNavTab = 'filmes';
    window.hlsInstance = null;
    window.ytPlayer = null;
    
    // Admin password
    const ADMIN_PASS = "admin123";
    
    // 8.a Sistema de Login/Cadastro
    window.showLoginModal = () => document.getElementById('loginModal').style.display = 'flex';
    window.hideLoginModal = () => document.getElementById('loginModal').style.display = 'none';
    
    window.registerUser = async (email, pass) => {
        try {
            await createUserWithEmailAndPassword(auth, email, pass);
            showToast("Conta criada com sucesso!");
            hideLoginModal();
        } catch (e) { alert(e.message); }
    };
    
    window.logoutUser = () => signOut(auth);
    
    // 8.b Player / Reprodução
    window.playMedia = (item, type) => {
        window.currentMedia = item;
        document.getElementById('playerWrapper').style.display = 'block';
        const video = document.getElementById('mainVideoPlayer');
        const ytDiv = document.getElementById('youtubePlayerContainer');
        
        // Reseta
        video.classList.remove('hidden');
        ytDiv.classList.add('hidden');
        if(window.hlsInstance) window.hlsInstance.destroy();
        
        const url = item.url;
        
        // 8.p Função Extract Youtube ID
        function extractYoutubeId(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }
        
        const ytId = extractYoutubeId(url);
        if(ytId) {
            video.classList.add('hidden');
            ytDiv.classList.remove('hidden');
            if(window.ytPlayer) window.ytPlayer.destroy();
            window.ytPlayer = new YT.Player('youtubePlayerContainer', {
                height: '100%',
                width: '100%',
                videoId: ytId,
                playerVars: { 'autoplay': 1, 'controls': 1 }
            });
        } else if(url.includes('.m3u8')) {
            if(Hls.isSupported()) {
                window.hlsInstance = new Hls();
                window.hlsInstance.loadSource(url);
                window.hlsInstance.attachMedia(video);
                video.play();
            }
        } else {
            video.src = url;
            video.play();
        }
        
        // Registrar visualização
        registerWatchedHistory(item.id);
        // Atualizar URL
        window.history.pushState({}, '', `/${type}/${item.slug || item.id}`);
    };
    
    window.closePlayer = () => {
        document.getElementById('playerWrapper').style.display = 'none';
        document.getElementById('mainVideoPlayer').pause();
        if(window.ytPlayer) window.ytPlayer.stopVideo();
        window.history.pushState({}, '', '/');
    };
    
    // 8.o Busca Global
    window.openGlobalSearchModal = () => {
        document.getElementById('globalSearchModal').innerHTML = `
            <div class="bg-gray-900 w-full max-w-2xl rounded-2xl p-6 max-h-[80vh] overflow-auto">
                <div class="flex justify-between mb-4">
                    <h3 class="text-xl font-bold">Buscar em Noite Filmes</h3>
                    <button onclick="document.getElementById('globalSearchModal').style.display='none'"><i class="fas fa-times"></i></button>
                </div>
                <input type="text" id="globalSearchInput" placeholder="Filmes, séries, canais..." class="w-full p-3 bg-gray-800 rounded-lg mb-4">
                <div id="globalSearchResults"></div>
            </div>
        `;
        document.getElementById('globalSearchModal').style.display = 'flex';
        document.getElementById('globalSearchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const results = [...filmes, ...series, ...canais].filter(i => i.titulo?.toLowerCase().includes(term));
            document.getElementById('globalSearchResults').innerHTML = results.map(r => `
                <div onclick="playMedia(${JSON.stringify(r).replace(/"/g, '&quot;')}, '${r.tipo}')" class="p-2 hover:bg-gray-800 rounded cursor-pointer flex items-center gap-3">
                    <img src="${r.thumb}" class="w-12 h-16 object-cover rounded"><span>${r.titulo}</span>
                </div>
            `).join('');
        });
    };
    
    // 3.D Utilitárias
    window.showToast = (msg) => {
        const toast = document.createElement('div');
        toast.className = 'fixed bottom-20 left-1/2 -translate-x-1/2 bg-green-600 text-white px-6 py-3 rounded-full z-50';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    };
    
    window.registerWatchedHistory = (id) => {
        if(!currentUser) return;
        const ref = ref(db, `visualizacoes/${id}/${currentUser.uid}`);
        set(ref, { timestamp: Date.now() });
    };
    
    // 3.A Roteamento / Navegação
    window.switchSection = (sectionId) => {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(sectionId).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        // Mobile nav update
    };
    
    // Inicialização
    window.addEventListener('popstate', (e) => {
        // Lógica para voltar do player ou página
        if(document.getElementById('playerWrapper').style.display === 'block') {
            closePlayer();
        }
    });
    
    // Carregar Dados Mockados para demonstração (já que não temos Firebase real)
    window.filmes = [
        { id: '1', titulo: 'Branca de Neve', slug: 'branca-de-neve', thumb: 'https://via.placeholder.com/300x450/1a1a2e/ffffff?text=Branca+de+Neve', url: 'https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8', tipo: 'filme', descricao: 'A princesa mais bela de todas.' },
        { id: '2', titulo: 'Matrix Resurrections', slug: 'matrix', thumb: 'https://via.placeholder.com/300x450/1a1a2e/ffffff?text=Matrix', url: 'https://www.youtube.com/watch?v=9ix7TUGVYIo', tipo: 'filme' }
    ];
    
    window.series = [
        { id: '3', titulo: 'Round 6', slug: 'round-6', thumb: 'https://via.placeholder.com/300x450/1a1a2e/ffffff?text=Round+6', url: 'https://www.youtube.com/watch?v=oqxAJKy0ii4', tipo: 'serie' }
    ];
    
    window.canais = [
        { id: '4', titulo: 'SBT', slug: 'sbt', thumb: 'https://via.placeholder.com/300x450/1a1a2e/ffffff?text=SBT', url: 'https://sbtvd-video.akamaized.net/out/v1/ba1e1f1b1c1d1e1f1a1b1c1d1e1f1a1b/index.m3u8', tipo: 'canal' }
    ];
    
    // 3.C Render Grid
    window.renderGrid = () => {
        const grid = document.getElementById('contentGrid');
        grid.innerHTML = filmes.map(f => `
            <div class="glass-card cursor-pointer" onclick="playMedia(${JSON.stringify(f).replace(/"/g, '&quot;')}, 'filme')">
                <img src="${f.thumb}" class="w-full aspect-[2/3] object-cover rounded-t-lg">
                <div class="p-3"><h3 class="font-semibold truncate">${f.titulo}</h3></div>
            </div>
        `).join('');
        
        document.getElementById('seriesGrid').innerHTML = series.map(s => `
            <div class="glass-card cursor-pointer" onclick="playMedia(${JSON.stringify(s).replace(/"/g, '&quot;')}, 'serie')">
                <img src="${s.thumb}" class="w-full aspect-[2/3] object-cover rounded-t-lg">
                <div class="p-3"><h3 class="font-semibold truncate">${s.titulo}</h3></div>
            </div>
        `).join('');
        
        document.getElementById('canaisGrid').innerHTML = canais.map(c => `
            <div class="glass-card cursor-pointer" onclick="playMedia(${JSON.stringify(c).replace(/"/g, '&quot;')}, 'canal')">
                <img src="${c.thumb}" class="w-full aspect-[2/3] object-cover rounded-t-lg">
                <div class="p-3"><h3 class="font-semibold truncate">${c.titulo}</h3></div>
            </div>
        `).join('');
    };
    
    window.onload = () => {
        renderGrid();
        
        // Auth Listener
        onAuthStateChanged(auth, (user) => {
            window.currentUser = user;
            if(!user) showLoginModal();
            else hideLoginModal();
        });
        
        // Estrutura do Modal de Login (HTML via JS)
        document.getElementById('loginModal').innerHTML = `
            <div class="glass w-full max-w-md p-8 rounded-3xl">
                <h2 class="text-2xl font-bold mb-6">Entrar no Noite Filmes</h2>
                <input type="email" id="loginEmail" placeholder="Email" class="w-full p-3 bg-gray-800 rounded-lg mb-3">
                <input type="password" id="loginPass" placeholder="Senha" class="w-full p-3 bg-gray-800 rounded-lg mb-3">
                <button onclick="signIn()" class="w-full bg-red-600 p-3 rounded-lg font-bold">Entrar</button>
                <button onclick="registerUser(document.getElementById('loginEmail').value, document.getElementById('loginPass').value)" class="w-full mt-2 text-sm text-gray-400">Criar Conta</button>
            </div>
        `;
        window.signIn = () => {
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPass').value;
            signInWithEmailAndPassword(auth, email, pass).catch(e => alert(e.message));
        };
    };
    
    // Expor funções globalmente para onclick inline
    window.playMedia = playMedia;
    window.closePlayer = closePlayer;
    window.switchSection = switchSection;
    window.registerUser = registerUser;
    window.openGlobalSearchModal = openGlobalSearchModal;
    
</script>

<!-- YouTube API -->

    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";

    // Callback global para YT API
    function onYouTubeIframeAPIReady() {
        console.log("YT Ready");
    }
</script>

</body>
</html>
