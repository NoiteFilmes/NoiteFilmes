<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NoiteFilmes - Rede Social para Cinéfilos</title>
    <link rel="icon" type="image/png" href="https://via.placeholder.com/32x32?text=NF">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.8/dist/hls.min.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: #0a0a0a; overflow-x: hidden; transition: background 0.3s, color 0.3s; padding-bottom: 70px; }
        
        body.dark-mode { background-color: #0a0a0a; color: #e5e5e5; }
        body.light-mode { background-color: #f5f5f5; color: #1a1a1a; }
        body.light-mode .bg-gray-900 { background-color: #ffffff !important; }
        body.light-mode .bg-gray-800 { background-color: #f0f0f0 !important; }
        body.light-mode .bg-gray-700 { background-color: #e0e0e0 !important; }
        body.light-mode .text-gray-200 { color: #1a1a1a !important; }
        body.light-mode .text-gray-400 { color: #666 !important; }
        body.light-mode .border-gray-800 { border-color: #ddd !important; }
        
        .player-wrapper { background: #000; position: relative; padding-bottom: 56.25%; height: 0; }
        .player-wrapper iframe, .player-wrapper video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .card-hover:hover { transform: scale(1.02); transition: 0.2s; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.5); }
        .active-tab { color: #e50914 !important; }
        .like-btn.active { color: #ff4d4d; }
        .save-btn.active { color: #ffd700; }
        .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 10px 20px; border-radius: 8px; z-index: 1000; animation: fadeOut 3s forwards; white-space: nowrap; }
        @keyframes fadeOut { 0% { opacity: 1; } 70% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }
        .watermark {
            position: fixed;
            bottom: 70px;
            left: 10px;
            z-index: 998;
            background: rgba(0,0,0,0.5);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: bold;
            backdrop-filter: blur(5px);
            pointer-events: none;
            font-family: monospace;
            border: 1px solid #e50914;
            color: white;
        }
        .watermark i { color: #e50914; margin-right: 4px; font-size: 10px; }
        .genre-filter-active { background-color: #e50914 !important; color: white !important; }
        
        /* Bottom Menu */
        .bottom-menu {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #1a1a1a;
            border-top: 1px solid #e50914;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            z-index: 100;
        }
        .bottom-menu-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            transition: all 0.2s;
            padding: 4px 12px;
            border-radius: 8px;
            color: #888;
        }
        .bottom-menu-item.active { color: #e50914; }
        .bottom-menu-item i { font-size: 22px; }
        .bottom-menu-item span { font-size: 10px; }
        
        /* Perfil */
        .profile-header {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #e50914;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .follow-btn {
            background: #e50914;
            color: white;
            padding: 6px 20px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            font-size: 12px;
        }
        .follow-btn.following { background: #333; }
        .rating-stars { display: inline-flex; gap: 4px; cursor: pointer; }
        .star { font-size: 20px; color: #555; transition: 0.2s; }
        .star.active { color: #ffc107; }
        
        /* Post */
        .post-card {
            background: #1f1f1f;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
        }
        .post-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        .post-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #e50914;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        .post-username { font-weight: bold; color: #e50914; cursor: pointer; }
        .post-rating { margin: 8px 0; }
        .post-actions { display: flex; gap: 20px; margin-top: 12px; }
        .post-action { cursor: pointer; display: flex; align-items: center; gap: 6px; color: #888; }
        .post-action:hover { color: #e50914; }
        .comments-section { margin-top: 12px; padding-top: 12px; border-top: 1px solid #333; }
        .comment { display: flex; gap: 8px; margin-bottom: 8px; font-size: 12px; }
        .comment-avatar { width: 24px; height: 24px; border-radius: 50%; background: #e50914; display: flex; align-items: center; justify-content: center; font-size: 10px; }
        
        /* Chat Individual */
        .chat-list {
            position: fixed;
            bottom: 70px;
            right: 10px;
            width: 320px;
            max-height: 400px;
            background: #1a1a1a;
            border-radius: 20px;
            border: 1px solid #e50914;
            z-index: 1100;
            display: none;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-list.open { display: flex; }
        .chat-list-header {
            padding: 12px;
            background: #e50914;
            display: flex;
            justify-content: space-between;
            cursor: pointer;
        }
        .chat-list-items { overflow-y: auto; max-height: 350px; }
        .chat-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            cursor: pointer;
            border-bottom: 1px solid #333;
        }
        .chat-item:hover { background: #2a2a2a; }
        .chat-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #e50914;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .chat-online { color: #4ade80; font-size: 10px; }
        .chat-last-seen { font-size: 10px; color: #888; }
        
        /* Chat Individual Window */
        .chat-window {
            position: fixed;
            bottom: 70px;
            right: 340px;
            width: 350px;
            height: 500px;
            background: #1a1a1a;
            border-radius: 20px;
            border: 1px solid #e50914;
            z-index: 1100;
            display: none;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-window.open { display: flex; }
        .chat-window-header {
            padding: 12px;
            background: #e50914;
            display: flex;
            justify-content: space-between;
            cursor: pointer;
        }
        .chat-window-messages {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .chat-window-input {
            padding: 12px;
            border-top: 1px solid #333;
            display: flex;
            gap: 8px;
        }
        .chat-window-input input {
            flex: 1;
            padding: 8px;
            background: #2a2a2a;
            border: none;
            border-radius: 20px;
            color: white;
        }
        .chat-bubble {
            max-width: 80%;
            padding: 8px 12px;
            border-radius: 18px;
            margin: 4px 0;
        }
        .chat-bubble.my { background: #e50914; align-self: flex-end; }
        .chat-bubble.other { background: #2a2a2a; align-self: flex-start; }
        
        .floating-player {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 800px;
            z-index: 1200;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        .floating-player .player-wrapper { padding-bottom: 56.25%; }
        .floating-player-close {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            border: none;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 10;
        }
        .floating-player-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 1199;
        }
        
        /* Modal de Avaliação */
        .rating-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 1300;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .rating-box {
            background: #1a1a1a;
            border-radius: 20px;
            padding: 25px;
            width: 90%;
            max-width: 400px;
        }
        .rating-stars-big { font-size: 40px; display: flex; gap: 8px; justify-content: center; margin: 20px 0; cursor: pointer; }
        .rating-stars-big .star { font-size: 40px; }
        
        .login-modal, .settings-modal, .search-popup { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.95); z-index: 2000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .login-box, .settings-box, .search-popup-content { background: #1a1a1a; border-radius: 20px; padding: 25px; width: 90%; max-width: 350px; border: 1px solid #e50914; }
        .login-input, .settings-input { width: 100%; padding: 10px; background: #2a2a2a; border: 1px solid #444; border-radius: 8px; color: white; margin-bottom: 10px; }
        .login-btn, .settings-btn { background: #e50914; color: white; padding: 10px; border: none; border-radius: 8px; width: 100%; cursor: pointer; }
        .switch-auth { color: #e50914; cursor: pointer; text-align: center; margin-top: 10px; font-size: 12px; }
        .hidden { display: none; }
        
        .carousel-container { overflow-x: auto; scroll-behavior: smooth; scrollbar-width: thin; }
        .carousel-container::-webkit-scrollbar { height: 4px; }
        .carousel-container::-webkit-scrollbar-track { background: #1f1f1f; border-radius: 10px; }
        .carousel-container::-webkit-scrollbar-thumb { background: rgba(229, 9, 20, 0.5); border-radius: 10px; }
        .carousel-track { display: flex; gap: 12px; padding: 4px 0; }
        .carousel-item { flex: 0 0 calc(20% - 10px); min-width: 0; transition: transform 0.2s; position: relative; }
        @media (max-width: 640px) { .carousel-item { flex: 0 0 calc(20% - 8px); } }
        .carousel-item .poster-wrapper { position: relative; border-radius: 8px; overflow: hidden; }
        .carousel-item .poster-front { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
        .carousel-item .rank-number { position: absolute; top: -6px; left: -6px; width: 24px; height: 24px; background: #e50914; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; z-index: 2; }
        
        .batch-input { width: 100%; padding: 10px; background: #2a2a2a; border: 1px solid #444; border-radius: 8px; color: white; font-family: monospace; font-size: 11px; }
        .duplicate-item { background: rgba(229, 9, 20, 0.2); border-left: 3px solid #e50914; }
    </style>
</head>
<body class="dark-mode">

    <div class="watermark">
        <i class="fab fa-instagram"></i> @NoiteFilmes
    </div>

    <!-- Telas principais -->
    <div id="feedScreen" class="hidden">
        <div class="container mx-auto px-2 mt-2" id="feedContainer"></div>
    </div>

    <div id="filmesScreen">
        <div class="container mx-auto px-2 mt-2">
            <div class="flex items-center gap-1 mb-1">
                <i class="fas fa-chart-line text-red-500 text-xs"></i>
                <h2 class="font-bold text-xs">Top 10</h2>
            </div>
            <div class="relative">
                <div id="top10Carousel" class="carousel-container overflow-x-auto">
                    <div id="top10Track" class="carousel-track"></div>
                </div>
            </div>
        </div>
        
        <div id="floatingPlayerOverlay" class="floating-player-overlay hidden"></div>
        <div id="floatingPlayer" class="floating-player hidden">
            <button id="closeFloatingPlayer" class="floating-player-close"><i class="fas fa-times"></i></button>
            <div class="player-wrapper">
                <div id="floatingYoutubePlayerDiv"></div>
                <div id="floatingNoContent" class="absolute inset-0 flex items-center justify-center text-gray-500 bg-black text-sm">Carregando...</div>
            </div>
            <div class="p-2 bg-gray-800">
                <h3 id="floatingMediaTitle" class="text-sm font-bold">Título</h3>
                <div class="flex gap-2 text-xs text-gray-400">
                    <span id="floatingMediaYear"></span>
                    <span id="floatingMediaGenre"></span>
                </div>
                <div class="flex gap-2 mt-1">
                    <button id="rateMovieBtn" class="text-xs bg-red-600 px-2 py-1 rounded">Avaliar</button>
                    <button id="commentMovieBtn" class="text-xs bg-gray-600 px-2 py-1 rounded">Comentar</button>
                </div>
            </div>
        </div>

        <div id="playerSection" class="container mx-auto px-2 mt-2 hidden">
            <div class="bg-gray-900 rounded-xl overflow-hidden shadow-2xl">
                <div class="player-wrapper">
                    <div id="youtubePlayerDiv"></div>
                    <video id="hlsPlayer" controls style="display: none; width:100%; height:100%; background: black;"></video>
                    <div id="noContent" class="absolute inset-0 flex items-center justify-center text-gray-500 bg-black text-sm">Carregando...</div>
                </div>
                <div class="p-2 bg-gray-800 border-t border-gray-700">
                    <div class="flex justify-between items-start flex-wrap gap-1">
                        <div class="flex-1">
                            <h2 id="currentMediaTitle" class="text-sm font-bold">Nenhum conteúdo</h2>
                            <p id="currentMediaDesc" class="text-xs text-gray-400">Detalhes</p>
                            <div class="flex gap-2 text-xs text-gray-500">
                                <span id="mediaYear"></span>
                                <span id="mediaGenre"></span>
                            </div>
                        </div>
                        <div class="flex gap-2 text-lg">
                            <button id="likeButton" class="like-btn"><i class="far fa-heart"></i></button>
                            <button id="saveButton" class="save-btn"><i class="far fa-star"></i></button>
                            <button id="shareButton"><i class="fas fa-share-alt"></i></button>
                            <button id="closePlayerBtn"><i class="fas fa-times"></i></button>
                        </div>
                    </div>
                    <div class="flex gap-2 mt-2">
                        <button id="rateMovieBtnMain" class="text-xs bg-red-600 px-3 py-1 rounded">⭐ Avaliar</button>
                        <button id="commentMovieBtnMain" class="text-xs bg-gray-600 px-3 py-1 rounded">💬 Comentar</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="container mx-auto px-2 mt-2" id="filtrosArea">
            <div class="bg-gray-900 rounded-xl p-2">
                <div class="flex flex-wrap gap-1" id="genreFilters">
                    <button data-genre="todos" class="genre-filter px-2 py-0.5 rounded-full bg-gray-800 text-xs genre-filter-active">🎬 Todos</button>
                </div>
            </div>
        </div>

        <div class="container mx-auto px-2 mt-3 mb-12">
            <div id="contentGrid" class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 lg:grid-cols-6 gap-2"></div>
        </div>
    </div>

    <div id="perfilScreen" class="hidden">
        <div class="container mx-auto px-2 mt-2" id="perfilContainer"></div>
    </div>

    <!-- Bottom Menu -->
    <div class="bottom-menu">
        <div class="bottom-menu-item" id="bottomFeedBtn"><i class="fas fa-newspaper"></i><span>Feed</span></div>
        <div class="bottom-menu-item active" id="bottomFilmesBtn"><i class="fas fa-film"></i><span>Filmes</span></div>
        <div class="bottom-menu-item" id="bottomPerfilBtn"><i class="fas fa-user"></i><span>Perfil</span></div>
        <div class="bottom-menu-item" id="bottomChatBtn"><i class="fas fa-comments"></i><span>Chats</span></div>
    </div>

    <!-- Chat List -->
    <div id="chatList" class="chat-list">
        <div class="chat-list-header" id="closeChatList">
            <span><i class="fas fa-comments"></i> Conversas</span>
            <i class="fas fa-times"></i>
        </div>
        <div id="chatListItems" class="chat-list-items"></div>
    </div>

    <!-- Chat Window Individual -->
    <div id="chatWindow" class="chat-window">
        <div class="chat-window-header" id="closeChatWindow">
            <span id="chatWindowTitle">Chat</span>
            <i class="fas fa-times"></i>
        </div>
        <div id="chatWindowMessages" class="chat-window-messages"></div>
        <div class="chat-window-input">
            <input type="text" id="chatWindowInput" placeholder="Digite sua mensagem...">
            <button id="sendChatWindowBtn" class="bg-red-600 px-3 py-2 rounded"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <!-- Rating Modal -->
    <div id="ratingModal" class="rating-modal hidden">
        <div class="rating-box">
            <h3 class="text-center font-bold">Avaliar Filme</h3>
            <div id="ratingStars" class="rating-stars-big">
                <i class="far fa-star star" data-value="1"></i>
                <i class="far fa-star star" data-value="2"></i>
                <i class="far fa-star star" data-value="3"></i>
                <i class="far fa-star star" data-value="4"></i>
                <i class="far fa-star star" data-value="5"></i>
                <i class="far fa-star star" data-value="6"></i>
                <i class="far fa-star star" data-value="7"></i>
                <i class="far fa-star star" data-value="8"></i>
                <i class="far fa-star star" data-value="9"></i>
                <i class="far fa-star star" data-value="10"></i>
            </div>
            <textarea id="ratingComment" class="w-full p-2 bg-gray-800 rounded mt-2" rows="3" placeholder="Escreva sua crítica..."></textarea>
            <button id="submitRatingBtn" class="login-btn mt-3">Publicar Avaliação</button>
            <button id="closeRatingModal" class="text-gray-400 text-center w-full mt-2">Cancelar</button>
        </div>
    </div>

    <!-- Modais de Login/Admin/Configuração -->
    <div id="loginModal" class="login-modal">
        <div class="login-box">
            <h2 class="text-xl font-bold mb-4 text-center">🎬 NoiteFilmes</h2>
            <div id="loginForm">
                <input type="email" id="loginEmail" class="login-input" placeholder="Email">
                <input type="password" id="loginPassword" class="login-input" placeholder="Senha">
                <button id="doLogin" class="login-btn">Entrar</button>
                <div class="switch-auth" id="showRegister">Não tem conta? Cadastre-se</div>
            </div>
            <div id="registerForm" class="hidden">
                <input type="email" id="registerEmail" class="login-input" placeholder="Email">
                <input type="password" id="registerPassword" class="login-input" placeholder="Senha">
                <input type="text" id="registerNickname" class="login-input" placeholder="@Nickname">
                <input type="text" id="registerBio" class="login-input" placeholder="Biografia">
                <div id="nicknameSuggestions" class="suggestions-box hidden"></div>
                <button id="doRegister" class="login-btn">Cadastrar</button>
                <div class="switch-auth" id="showLogin">Já tem conta? Faça login</div>
            </div>
        </div>
    </div>

    <div id="settingsModal" class="settings-modal hidden">
        <div class="settings-box">
            <div class="profile-icon"><i class="fas fa-user-circle"></i></div>
            <h3>Configurações</h3>
            <input type="text" id="usernameInput" class="settings-input" placeholder="Nome">
            <textarea id="bioInput" class="w-full p-2 bg-gray-800 rounded mb-2" rows="2" placeholder="Biografia"></textarea>
            <input type="text" id="linkInput" class="settings-input" placeholder="Link">
            <button id="saveProfileBtn" class="settings-btn">Salvar Perfil</button>
            <div class="mode-buttons flex gap-2 mt-2">
                <button id="darkModeSettingsBtn" class="mode-btn bg-gray-700 p-2 rounded flex-1"><i class="fas fa-moon"></i> Dark</button>
                <button id="lightModeSettingsBtn" class="mode-btn bg-gray-700 p-2 rounded flex-1"><i class="fas fa-sun"></i> Light</button>
            </div>
            <button id="logoutSettingsBtn" class="settings-btn mt-2" style="background:#333;">Sair da Conta</button>
        </div>
    </div>

    <div id="adminModal" class="fixed inset-0 bg-black bg-opacity-80 z-50 flex items-center justify-center p-3 hidden">
        <div class="bg-gray-900 rounded-xl w-full max-w-4xl max-h-[90vh] overflow-y-auto border border-gray-700">
            <div class="sticky top-0 bg-gray-900 p-3 border-b border-gray-700 flex justify-between items-center">
                <h2 class="text-lg font-bold"><i class="fas fa-lock mr-2"></i> Admin</h2>
                <button id="closeAdminModal" class="text-gray-400 hover:text-white text-xl">&times;</button>
            </div>
            <div class="p-4">
                <div id="adminLoginArea" class="mb-4">
                    <label class="block mb-1 text-sm">Senha Admin:</label>
                    <div class="flex gap-2">
                        <input type="password" id="adminPassword" placeholder="Senha" class="bg-gray-800 border border-gray-600 rounded px-3 py-2 flex-1">
                        <button id="loginAdminBtn" class="bg-red-700 hover:bg-red-800 px-4 py-2 rounded">Entrar</button>
                    </div>
                    <p class="text-xs text-gray-400 mt-1">Senha: <strong>admin123</strong></p>
                </div>
                <div id="adminPanel" class="hidden">
                    <div class="flex space-x-3 border-b border-gray-700 mb-3">
                        <button id="adminTabCanais" class="admin-tab-btn py-1 px-2 text-gray-400 text-sm">Canais</button>
                        <button id="adminTabFilmes" class="admin-tab-btn py-1 px-2 text-red-500 border-b-2 border-red-600 text-sm">Filmes</button>
                        <button id="adminTabSeries" class="admin-tab-btn py-1 px-2 text-gray-400 text-sm">Séries</button>
                    </div>

        // Atualizar último visto
        function updateLastSeen() {
            if (currentUser) {
                database.ref(`users/${currentUser.uid}/lastSeen`).set(firebase.database.ServerValue.TIMESTAMP);
                database.ref(`users/${currentUser.uid}/online`).set(true);
                database.ref(`users/${currentUser.uid}/online`).onDisconnect().set(false);
                database.ref(`users/${currentUser.uid}/lastSeen`).onDisconnect().set(firebase.database.ServerValue.TIMESTAMP);
            }
        }
        
        // Formatar último visto
        function formatLastSeen(timestamp) {
            if (!timestamp) return "nunca visto";
            const now = Date.now();
            const diff = now - timestamp;
            const minutes = Math.floor(diff / 60000);
            const hours = Math.floor(diff / 3600000);
            const days = Math.floor(diff / 86400000);
            if (minutes < 1) return "agora mesmo";
            if (minutes < 60) return `${minutes} minuto${minutes !== 1 ? 's' : ''} atrás`;
            if (hours < 24) return `${hours} hora${hours !== 1 ? 's' : ''} atrás`;
            return `${days} dia${days !== 1 ? 's' : ''} atrás`;
        }
        
        // Funções de Perfil e Postagens
        async function createPost(movieId, rating, comment) {
            const movie = filmes.find(f => f.id === movieId);
            if (!movie) return;
            const postId = Date.now() + '-' + Math.random().toString(36);
            await database.ref(`posts/${postId}`).set({
                id: postId,
                userId: currentUser.uid,
                username: currentUserData?.nickname || currentUser.email.split('@')[0],
                userAvatar: currentUserData?.nickname?.charAt(0).toUpperCase() || 'U',
                movieId: movieId,
                movieTitle: movie.title,
                movieThumb: movie.thumb,
                rating: rating,
                comment: comment,
                likes: 0,
                comments: [],
                timestamp: Date.now()
            });
            showToast(`✅ Avaliação publicada!`);
        }
        
        function renderFeed() {
            const container = document.getElementById('feedContainer');
            database.ref('posts').orderByChild('timestamp').once('value', (snapshot) => {
                const posts = snapshot.val() ? Object.values(snapshot.val()).reverse() : [];
                if (posts.length === 0) {
                    container.innerHTML = '<div class="text-center py-10 text-gray-500">Nenhuma postagem ainda. Avalie um filme!</div>';
                    return;
                }
                container.innerHTML = posts.map(post => `
                    <div class="post-card" data-post-id="${post.id}">
                        <div class="post-header">
                            <div class="post-avatar">${post.userAvatar}</div>
                            <div>
                                <div class="post-username" data-user="${post.userId}">@${post.username}</div>
                                <div class="text-xs text-gray-500">${new Date(post.timestamp).toLocaleString()}</div>
                            </div>
                        </div>
                        <div class="flex gap-2">
                            <img src="${post.movieThumb}" class="w-16 h-24 object-cover rounded">
                            <div>
                                <div class="font-bold">${post.movieTitle}</div>
                                <div class="rating-stars">${renderStars(post.rating)}</div>
                                <div class="text-sm mt-1">${escapeHtml(post.comment || '')}</div>
                            </div>
                        </div>
                        <div class="post-actions">
                            <div class="post-action like-post" data-id="${post.id}"><i class="far fa-heart"></i> <span>${post.likes || 0}</span></div>
                            <div class="post-action comment-post" data-id="${post.id}"><i class="far fa-comment"></i> <span>${post.comments?.length || 0}</span></div>
                        </div>
                        <div class="comments-section hidden" id="comments-${post.id}">
                            ${(post.comments || []).map(c => `
                                <div class="comment">
                                    <div class="comment-avatar">${c.username?.charAt(0).toUpperCase()}</div>
                                    <div><strong>@${c.username}</strong> ${escapeHtml(c.text)}</div>
                                </div>
                            `).join('')}
                            <div class="flex gap-2 mt-2">
                                <input type="text" id="comment-input-${post.id}" class="flex-1 p-1 bg-gray-700 rounded text-sm" placeholder="Escreva um comentário...">
                                <button class="submit-comment bg-red-600 px-2 py-1 rounded text-sm" data-id="${post.id}">Enviar</button>
                            </div>
                        </div>
                    </div>
                `).join('');
                
                document.querySelectorAll('.like-post').forEach(btn => {
                    btn.addEventListener('click', async (e) => {
                        const postId = btn.getAttribute('data-id');
                        const postRef = database.ref(`posts/${postId}`);
                        const snapshot = await postRef.once('value');
                        const post = snapshot.val();
                        if (post) {
                            const newLikes = (post.likes || 0) + 1;
                            await postRef.update({ likes: newLikes });
                            showToast('❤️ Curtiu!');
                        }
                    });
                });
                
                document.querySelectorAll('.comment-post').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const postId = btn.getAttribute('data-id');
                        const commentsDiv = document.getElementById(`comments-${postId}`);
                        commentsDiv.classList.toggle('hidden');
                    });
                });
                
                document.querySelectorAll('.submit-comment').forEach(btn => {
                    btn.addEventListener('click', async () => {
                        const postId = btn.getAttribute('data-id');
                        const input = document.getElementById(`comment-input-${postId}`);
                        const text = input.value.trim();
                        if (text && currentUser) {
                            const postRef = database.ref(`posts/${postId}`);
                            const snapshot = await postRef.once('value');
                            const post = snapshot.val();
                            const comments = post.comments || [];
                            comments.push({
                                userId: currentUser.uid,
                                username: currentUserData?.nickname || currentUser.email.split('@')[0],
                                text: text,
                                timestamp: Date.now()
                            });
                            await postRef.update({ comments: comments });
                            input.value = '';
                            showToast('💬 Comentário adicionado!');
                            renderFeed();
                        }
                    });
                });
                
                document.querySelectorAll('.post-username').forEach(el => {
                    el.addEventListener('click', () => {
                        const userId = el.getAttribute('data-user');
                        if (userId && userId !== currentUser?.uid) {
                            showOtherProfile(userId);
                        }
                    });
                });
            });
        }
        
        function renderStars(rating) {
            let stars = '';
            for (let i = 1; i <= 10; i++) {
                stars += `<i class="fas fa-star ${i <= rating ? 'text-yellow-500' : 'text-gray-600'}" style="font-size: 14px;"></i>`;
            }
            return stars;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function renderPerfil(userId = null) {
            const targetId = userId || currentUser?.uid;
            if (!targetId) return;
            database.ref(`users/${targetId}`).once('value', async (snapshot) => {
                const userData = snapshot.val();
                if (!userData) return;
                const isOwnProfile = targetId === currentUser?.uid;
                const isFollowing = isOwnProfile ? false : (currentUserData?.following?.includes(targetId) || false);
                const postsSnapshot = await database.ref('posts').orderByChild('userId').equalTo(targetId).once('value');
                const userPosts = postsSnapshot.val() ? Object.values(postsSnapshot.val()).reverse() : [];
                const container = document.getElementById('perfilContainer');
                container.innerHTML = `
                    <div class="profile-header text-center">
                        <div class="profile-avatar mx-auto">${userData.nickname?.charAt(0).toUpperCase() || 'U'}</div>

                        <div class="flex justify-center gap-4 mt-3">

                            <div><span class="font-bold">${userData.followers?.length || 0}</span> <span class="text-xs">seguidores</span></div>

                    postsGrid.innerHTML = '<div class="col-span-full text-center text-gray-500 py-4">Nenhuma avaliação ainda</div>';

                            <div class="rating-stars">${renderStars(post.rating)}</div>

                        </div>
                    `).join('');

                document.querySelectorAll('.follow-btn').forEach(btn => {
                    if (!btn.hasAttribute('data-user')) return;

                        const targetUserId = btn.getAttribute('data-user');

                        const snapshot = await userRef.once('value');
                        const userDataSnap = snapshot.val();
                        let following = userDataSnap?.following || [];
                        if (following.includes(targetUserId)) {
                            following = following.filter(id => id !== targetUserId);
                            showToast(`🔕 Deixou de seguir`);
                        } else {
                            following.push(targetUserId);

                document.querySelectorAll('[data-movie-id]').forEach(el => {

                            setScreen('filmes');

                        }

            });

        function showOtherProfile(userId) {
            setScreen('perfil');
            renderPerfil(userId);

        // Chat Individual

            if (!currentUser || !activeChatUserId) return;
            const chatId = [currentUser.uid, activeChatUserId].sort().join('_');
            database.ref(`chats/${chatId}`).orderByChild('timestamp').on('value', (snapshot) => {
                const messages = snapshot.val() ? Object.values(snapshot.val()) : [];
                const container = document.getElementById('chatWindowMessages');
                container.innerHTML = messages.map(msg => `
                    <div class="chat-bubble ${msg.senderId === currentUser.uid ? 'my' : 'other'}">

        function sendChatMessage() {
            const input = document.getElementById('chatWindowInput');
            const text = input.value.trim();
            if (text && currentUser && activeChatUserId) {
                const chatId = [currentUser.uid, activeChatUserId].sort().join('_');
                database.ref(`chats/${chatId}`).push({
                    senderId: currentUser.uid,
                    text: text,
                    timestamp: Date.now()
                });
                input.value = '';
            }
        }
        
        // Funções de Filme e Player
        function generateSafeId() { return Date.now() + '-' + Math.random().toString(36).substring(2, 15); }
        function extractYoutubeId(url) {
            if(!url) return null;
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }
        async function fetchYouTubeMetadata(url) {
            const videoId = extractYoutubeId(url);
            if (!videoId) return null;
            try {
                const oembedRes = await fetch(`https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${videoId}&format=json`);
                const oembedData = await oembedRes.json();
                let year = new Date().getFullYear();
                if(oembedData.title) { const yearMatch = oembedData.title.match(/(19|20)\d{2}/); if(yearMatch) year = yearMatch[0]; }
                let genre = 'Geral';
                const title = oembedData.title || '';
                const genres = ['Ação', 'Comédia', 'Drama', 'Terror', 'Ficção', 'Romance', 'Aventura', 'Suspense', 'Animação'];
                for(let g of genres) { if(title.toLowerCase().includes(g.toLowerCase())) { genre = g; break; } }
                return { title: oembedData.title || 'Sem título', thumb: oembedData.thumbnail_url || `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`, description: oembedData.title || 'Sem descrição', year: year, genre: genre, link: url };
            } catch(e) { return null; }
        }
        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        function loadFilmesFromFirebase() {
            database.ref('filmes').on('value', (snapshot) => {
                const data = snapshot.val();
                filmes = data ? Object.values(data) : [];
                renderGrid();
                generateWeeklyTop10();
                updateGenreFilters();
            });
        }
        
        function renderGrid() {
            let items = filmes;
            if(currentGenreFilter !== 'todos') items = items.filter(i => i.category === currentGenreFilter);
            const grid = document.getElementById('contentGrid');
            if(items.length === 0) { grid.innerHTML = '<div class="col-span-full text-center py-6 text-gray-500 text-sm">Nenhum filme encontrado</div>'; return; }
            grid.innerHTML = items.map(item => `
                <div class="bg-gray-800 rounded-lg overflow-hidden cursor-pointer card-hover transition" data-id="${item.id}">
                    <img src="${item.thumb || 'https://via.placeholder.com/300x200'}" class="w-full h-28 object-cover" onerror="this.src='https://via.placeholder.com/300x200'">
                    <div class="p-1">
                        <h3 class="font-semibold text-xs truncate">${item.title}</h3>
                        <p class="text-xs text-gray-400">${item.category || 'Geral'} ${item.year ? `• ${item.year}` : ''}</p>
                    </div>
                </div>
            `).join('');
            document.querySelectorAll('#contentGrid > div').forEach(card => {
                card.addEventListener('click', () => {
                    const id = card.getAttribute('data-id');
                    const item = filmes.find(f => f.id === id);
                    if(item) playMedia(item, 'filme');
                });
            });
        }
        
        function playMedia(item, type, elementRect = null) {
            const floatingPlayer = document.getElementById('floatingPlayer');
            const overlay = document.getElementById('floatingPlayerOverlay');
            const videoId = extractYoutubeId(item.link);
            if(!videoId) { showToast('Link inválido'); return; }
            floatingPlayer.classList.remove('hidden');
            overlay.classList.remove('hidden');
            document.getElementById('floatingMediaTitle').innerText = item.title;
            document.getElementById('floatingMediaYear').innerHTML = item.year ? `📅 ${item.year}` : '';
            document.getElementById('floatingMediaGenre').innerHTML = item.category ? `🎭 ${item.category}` : '';
            currentMedia = item;
            if(floatingYtPlayer) { floatingYtPlayer.loadVideoById(videoId); floatingYtPlayer.playVideo(); }
            else {
                floatingYtPlayer = new YT.Player('floatingYoutubePlayerDiv', {
                    height: '100%', width: '100%', videoId: videoId,
                    playerVars: { 'autoplay': 1, 'controls': 1, 'modestbranding': 1, 'rel': 0, 'showinfo': 0, 'fs': 1, 'playsinline': 1 },
                    events: { 'onReady': (event) => { event.target.playVideo(); document.getElementById('floatingNoContent').style.display = 'none'; } }
                });
            }
        }
        
        function closeFloatingPlayer() { if(floatingYtPlayer) floatingYtPlayer.stopVideo(); document.getElementById('floatingPlayer').classList.add('hidden'); document.getElementById('floatingPlayerOverlay').classList.add('hidden'); }
        function onYouTubeIframeAPIReady() { ytPlayer = new YT.Player('youtubePlayerDiv', { height: '100%', width: '100%', videoId: '', playerVars: { 'autoplay': 1, 'controls': 1 }, events: { 'onReady': (e) => { if(currentMedia) e.target.playVideo(); } } }); }
        
        function generateWeeklyTop10() {
            const allContent = [...filmes.map(f => ({...f, contentType: 'filme'}))];
            if(allContent.length === 0) return;
            const shuffled = [...allContent];
            for(let i = shuffled.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]]; }
            top10List = shuffled.slice(0, 10);
            const track = document.getElementById('top10Track');
            track.innerHTML = top10List.map((item, index) => `<div class="carousel-item cursor-pointer" data-id="${item.id}"><div class="poster-wrapper"><img src="${item.thumb}" class="poster-front"><div class="rank-number">${index+1}</div></div></div>`).join('');
            document.querySelectorAll('#top10Track .carousel-item').forEach(el => { el.addEventListener('click', () => { const id = el.getAttribute('data-id'); const item = filmes.find(f => f.id === id); if(item) playMedia(item, 'filme'); }); });
        }
        
        function updateGenreFilters() {
            const genres = new Set(); filmes.forEach(item => { if(item.category) genres.add(item.category); });
            let html = '<button data-genre="todos" class="genre-filter px-2 py-0.5 rounded-full bg-gray-800 text-xs genre-filter-active">🎬 Todos</button>';
            Array.from(genres).sort().forEach(genre => { html += `<button data-genre="${genre}" class="genre-filter px-2 py-0.5 rounded-full bg-gray-800 text-xs">${genre}</button>`; });
            document.getElementById('genreFilters').innerHTML = html;
            document.querySelectorAll('.genre-filter').forEach(btn => {
                if(btn.getAttribute('data-genre') === currentGenreFilter) btn.classList.add('genre-filter-active');
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.genre-filter').forEach(b => b.classList.remove('genre-filter-active'));
                    btn.classList.add('genre-filter-active');
                    currentGenreFilter = btn.getAttribute('data-genre');
                    renderGrid();
                });
            });
        }
        
        // Controle de Telas
        function setScreen(screen) {
            currentScreen = screen;
            document.getElementById('feedScreen').classList.add('hidden');
            document.getElementById('filmesScreen').classList.add('hidden');
            document.getElementById('perfilScreen').classList.add('hidden');
            if (screen === 'feed') document.getElementById('feedScreen').classList.remove('hidden');
            else if (screen === 'filmes') document.getElementById('filmesScreen').classList.remove('hidden');
            else if (screen === 'perfil') document.getElementById('perfilScreen').classList.remove('hidden');
            document.querySelectorAll('.bottom-menu-item').forEach(item => item.classList.remove('active'));
            if (screen === 'feed') document.getElementById('bottomFeedBtn').classList.add('active');
            else if (screen === 'filmes') document.getElementById('bottomFilmesBtn').classList.add('active');
            else if (screen === 'perfil') document.getElementById('bottomPerfilBtn').classList.add('active');
            if (screen === 'feed') renderFeed();
            if (screen === 'perfil') renderPerfil();
        }
        
        // Autenticação
        async function registerUser() {
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            let nickname = document.getElementById('registerNickname').value.trim();
            const bio = document.getElementById('registerBio').value.trim();
            if(nickname.startsWith('@')) nickname = nickname.substring(1);
            if(!nickname) { showToast('Digite um @nickname'); return; }
            try {
                const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                const user = userCredential.user;
                await database.ref(`users/${user.uid}`).set({
                    email: email, nickname: nickname, bio: bio || 'Cinéfilo apaixonado por filmes!',
                    createdAt: Date.now(), online: true, lastSeen: Date.now(), followers: [], following: []
                });
                showToast(`✅ Cadastro realizado! @${nickname}`);
                document.getElementById('registerForm').classList.add('hidden');
                document.getElementById('loginForm').classList.remove('hidden');
            } catch(error) { showToast('Erro: ' + error.message); }
        }
        
        function openSettingsModal() {
            if (!currentUserData) return;
            document.getElementById('settingsModal').classList.remove('hidden');
            document.getElementById('usernameInput').value = currentUserData?.nickname || '';
            document.getElementById('bioInput').value = currentUserData?.bio || '';
            document.getElementById('linkInput').value = currentUserData?.link || '';
        }
        
        async function saveProfile() {
            const newNickname = document.getElementById('usernameInput').value.trim();
            const bio = document.getElementById('bioInput').value.trim();
            const link = document.getElementById('linkInput').value.trim();
            if (newNickname && currentUser) {
                await database.ref(`users/${currentUser.uid}`).update({ nickname: newNickname, bio: bio, link: link });
                currentUserData.nickname = newNickname;
                currentUserData.bio = bio;
                currentUserData.link = link;
                showToast('✅ Perfil atualizado!');
                document.getElementById('settingsModal').classList.add('hidden');
                if (currentScreen === 'perfil') renderPerfil();
            }
        }
        
        function setDarkMode() { document.body.classList.remove('light-mode'); document.body.classList.add('dark-mode'); localStorage.setItem('noitefilmes_theme', 'dark'); }
        function setLightMode() { document.body.classList.remove('dark-mode'); document.body.classList.add('light-mode'); localStorage.setItem('noitefilmes_theme', 'light'); }
        function loadTheme() { const theme = localStorage.getItem('noitefilmes_theme'); if(theme === 'light') setLightMode(); else setDarkMode(); }
        
        function updateUserUI(user) {
            if (user) {
                document.getElementById('loginModal').classList.add('hidden');
                database.ref(`users/${user.uid}`).once('value', (snapshot) => {
                    currentUserData = snapshot.val();
                    loadFilmesFromFirebase();
                    updateLastSeen();
                    setScreen('filmes');
                    loadChatList();
                    setInterval(() => updateLastSeen(), 30000);
                    database.ref('users').on('value', () => loadChatList());
                });
            } else {
                document.getElementById('loginModal').classList.remove('hidden');
                currentUserData = null;
            }
        }
        
        // Admin Functions
        async function saveSingleItem() {
            const title = document.getElementById('itemTitle').value.trim();
            const link = document.getElementById('itemLink').value.trim();
            const thumb = document.getElementById('itemThumb').value.trim();
            const category = document.getElementById('itemCategory').value.trim();
            const year = document.getElementById('itemYear').value.trim();
            if(!title || !link) { showToast('❌ Preencha título e link'); return; }
            const videoId = extractYoutubeId(link);
            if(!videoId) { showToast('❌ Link inválido'); return; }
            const safeId = generateSafeId();
            await database.ref(`filmes/${safeId}`).set({ id: safeId, title, link, thumb: thumb || `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`, category: category || 'Geral', year: year || new Date().getFullYear(), description: title });
            showToast('✅ Filme salvo!');
            resetForm();
        }
        
        async function previewBatch() {
            const links = document.getElementById('batchLinksInput').value.split('\n').filter(l => l.trim() && extractYoutubeId(l.trim()));
            const items = [];
            for(let link of links) { const metadata = await fetchYouTubeMetadata(link.trim()); if(metadata) items.push(metadata); }
            batchPreviewItems = items;
            document.getElementById('batchPreview').innerHTML = items.map(item => `<div class="p-1 border-b border-gray-700 text-xs"><strong>${item.title}</strong></div>`).join('');
        }
        
        async function saveBatch() {
            for(let item of batchPreviewItems) {
                const safeId = generateSafeId();
                await database.ref(`filmes/${safeId}`).set({ id: safeId, title: item.title, link: item.link, thumb: item.thumb, category: item.genre, year: item.year, description: item.description });
            }
            showToast(`✅ ${batchPreviewItems.length} filmes salvos!`);
            batchPreviewItems = [];
            document.getElementById('batchLinksInput').value = '';
            document.getElementById('batchPreview').innerHTML = '';
        }
        
        function resetForm() { document.getElementById('itemTitle').value = ''; document.getElementById('itemLink').value = ''; document.getElementById('itemThumb').value = ''; document.getElementById('itemCategory').value = ''; document.getElementById('itemYear').value = ''; }
        async function autoFillFromYoutubeLink() {
            const link = document.getElementById('itemLink').value.trim();
            if(!link) return;
            const metadata = await fetchYouTubeMetadata(link);
            if(metadata) { document.getElementById('itemTitle').value = metadata.title; document.getElementById('itemThumb').value = metadata.thumb; document.getElementById('itemCategory').value = metadata.genre; document.getElementById('itemYear').value = metadata.year; showToast(`✅ Dados carregados`); }
        }
        
        function refreshAdminLists() {
            if(!isAdminLogged) return;
            document.getElementById('filmesAdminList').innerHTML = filmes.map(f => `<div class="bg-gray-800 p-1 rounded flex justify-between text-xs"><span>${f.title.substring(0,25)}</span><button class="delete-filme text-red-500" data-id="${f.id}"><i class="fas fa-trash"></i></button></div>`).join('');
            document.querySelectorAll('.delete-filme').forEach(btn => btn.addEventListener('click', () => { const id = btn.getAttribute('data-id'); database.ref(`filmes/${id}`).remove(); showToast('Filme removido'); }));
        }
        
        // Rating Modal
        let currentRatingMovie = null;
        function openRatingModal(movie) {
            currentRatingMovie = movie;
            document.getElementById('ratingModal').classList.remove('hidden');
            document.getElementById('ratingComment').value = '';
            document.querySelectorAll('#ratingStars .star').forEach(star => {
                star.classList.remove('fas', 'active');
                star.classList.add('far');
            });
        }
        
        document.querySelectorAll('#ratingStars .star').forEach(star => {
            star.addEventListener('click', () => {
                const value = parseInt(star.getAttribute('data-value'));
                document.querySelectorAll('#ratingStars .star').forEach((s, idx) => {
                    if (idx < value) { s.classList.remove('far'); s.classList.add('fas', 'active'); }
                    else { s.classList.remove('fas', 'active'); s.classList.add('far'); }
                });
            });
        });
        
        document.getElementById('submitRatingBtn').onclick = async () => {
            if (!currentRatingMovie || !currentUser) return;
            let rating = 0;
            document.querySelectorAll('#ratingStars .star').forEach((s, idx) => { if (s.classList.contains('fas')) rating = idx + 1; });
            const comment = document.getElementById('ratingComment').value;
            if (rating === 0) { showToast('Selecione uma nota'); return; }
            await createPost(currentRatingMovie.id, rating, comment);
            document.getElementById('ratingModal').classList.add('hidden');
            currentRatingMovie = null;
        };
        document.getElementById('closeRatingModal').onclick = () => document.getElementById('ratingModal').classList.add('hidden');
        
        // Event Listeners
        document.getElementById('bottomFeedBtn').onclick = () => { setScreen('feed'); if(currentUser) renderFeed(); else showToast('Faça login'); };
        document.getElementById('bottomFilmesBtn').onclick = () => setScreen('filmes');
        document.getElementById('bottomPerfilBtn').onclick = () => { if(currentUser) { setScreen('perfil'); renderPerfil(); } else showToast('Faça login'); };
        document.getElementById('bottomChatBtn').onclick = () => { if(currentUser) document.getElementById('chatList').classList.toggle('open'); else showToast('Faça login'); };
        document.getElementById('closeChatList').onclick = () => document.getElementById('chatList').classList.remove('open');
        document.getElementById('closeChatWindow').onclick = () => document.getElementById('chatWindow').classList.remove('open');
        document.getElementById('sendChatWindowBtn').onclick = sendChatMessage;
        document.getElementById('chatWindowInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendChatMessage(); });
        document.getElementById('closeFloatingPlayer').onclick = closeFloatingPlayer;
        document.getElementById('floatingPlayerOverlay').onclick = closeFloatingPlayer;
        document.getElementById('rateMovieBtn').onclick = () => { if(currentMedia) openRatingModal(currentMedia); };
        document.getElementById('rateMovieBtnMain').onclick = () => { if(currentMedia) openRatingModal(currentMedia); };
        document.getElementById('commentMovieBtn').onclick = () => { if(currentMedia) openRatingModal(currentMedia); };
        document.getElementById('commentMovieBtnMain').onclick = () => { if(currentMedia) openRatingModal(currentMedia); };
        document.getElementById('likeButton').onclick = () => showToast('Funcionalidade em desenvolvimento');
        document.getElementById('saveButton').onclick = () => showToast('Funcionalidade em desenvolvimento');
        document.getElementById('shareButton').onclick = () => showToast('Funcionalidade em desenvolvimento');
        document.getElementById('closePlayerBtn').onclick = () => document.getElementById('playerSection').classList.add('hidden');
        document.getElementById('darkModeBtn').onclick = setDarkMode;
        document.getElementById('lightModeBtn').onclick = setLightMode;
        document.getElementById('darkModeSettingsBtn').onclick = setDarkMode;
        document.getElementById('lightModeSettingsBtn').onclick = setLightMode;
        document.getElementById('saveProfileBtn').onclick = saveProfile;
        document.getElementById('logoutSettingsBtn').onclick = () => auth.signOut();
        document.getElementById('doLogin').onclick = () => { const email = document.getElementById('loginEmail').value; const password = document.getElementById('loginPassword').value; auth.signInWithEmailAndPassword(email, password).catch(e => showToast('Erro: ' + e.message)); };
        document.getElementById('doRegister').onclick = registerUser;
        document.getElementById('showRegister').onclick = () => { document.getElementById('loginForm').classList.add('hidden'); document.getElementById('registerForm').classList.remove('hidden'); };
        document.getElementById('showLogin').onclick = () => { document.getElementById('registerForm').classList.add('hidden'); document.getElementById('loginForm').classList.remove('hidden'); };
        document.getElementById('saveItemBtn').onclick = saveSingleItem;
        document.getElementById('cancelEditBtn').onclick = resetForm;
        document.getElementById('itemLink').addEventListener('blur', autoFillFromYoutubeLink);
        document.getElementById('previewBatchBtn').onclick = previewBatch;
        document.getElementById('saveBatchBtn').onclick = saveBatch;
        
        const modal = document.getElementById('adminModal');
        document.getElementById('adminBtn').onclick = () => { modal.classList.remove('hidden'); document.getElementById('adminLoginArea').classList.remove('hidden'); document.getElementById('adminPanel').classList.add('hidden'); };
        document.getElementById('closeAdminModal').onclick = () => modal.classList.add('hidden');
        document.getElementById('loginAdminBtn').onclick = () => { if(document.getElementById('adminPassword').value === 'admin123') { isAdminLogged = true; document.getElementById('adminLoginArea').classList.add('hidden'); document.getElementById('adminPanel').classList.remove('hidden'); refreshAdminLists(); } else alert('Senha incorreta'); };
        document.getElementById('adminTabFilmes').onclick = () => { document.querySelectorAll('.admin-tab-btn').forEach(btn => btn.classList.remove('border-b-2', 'border-red-600', 'text-red-500')); document.getElementById('adminTabFilmes').classList.add('border-b-2', 'border-red-600', 'text-red-500'); document.getElementById('adminCanaisList').classList.add('hidden'); document.getElementById('adminFilmesList').classList.remove('hidden'); document.getElementById('adminSeriesList').classList.add('hidden'); document.getElementById('batchFilmesArea').classList.remove('hidden'); document.getElementById('batchSeriesArea').classList.add('hidden'); resetForm(); };
        
        auth.onAuthStateChanged((user) => { currentUser = user; updateUserUI(user); });
        loadTheme();
        if(typeof YT === 'undefined') { window.onYouTubeIframeAPIReady = onYouTubeIframeAPIReady; } else { onYouTubeIframeAPIReady(); }
        
        // Atualizar status online
        setInterval(() => {
            if (currentUser) {
                database.ref(`users/${currentUser.uid}/lastSeen`).set(firebase.database.ServerValue.TIMESTAMP);
            }
        }, 30000);
    </script>
</body>
</html>
