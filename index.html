    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: #0a0a0a; overflow-x: hidden; padding-bottom: 70px; }
        .player-wrapper { background: #000; position: relative; padding-bottom: 56.25%; height: 0; }
        .player-wrapper iframe, .player-wrapper video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .card-hover:hover { transform: scale(1.02); transition: 0.2s; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.5); }
        .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 10px 20px; border-radius: 8px; z-index: 1000; animation: fadeOut 3s forwards; white-space: nowrap; }
        @keyframes fadeOut { 0% { opacity: 1; } 70% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }
        .watermark { position: fixed; bottom: 70px; left: 10px; z-index: 998; background: rgba(0,0,0,0.5); padding: 4px 10px; border-radius: 20px; font-size: 10px; backdrop-filter: blur(5px); pointer-events: none; border: 1px solid #e50914; color: white; }
        .genre-filter-active { background-color: #e50914 !important; color: white !important; }
        
        .bottom-menu { position: fixed; bottom: 0; left: 0; right: 0; background: #1a1a1a; border-top: 1px solid #e50914; display: flex; justify-content: space-around; padding: 10px 0; z-index: 100; }
        .bottom-menu-item { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; padding: 4px 12px; border-radius: 8px; color: #888; }
        .bottom-menu-item.active { color: #e50914; }
        .bottom-menu-item i { font-size: 22px; }
        .bottom-menu-item span { font-size: 10px; }
        
        .profile-header { background: linear-gradient(135deg, #1a1a2e, #16213e); border-radius: 20px; padding: 20px; margin-bottom: 20px; text-align: center; }
        .profile-avatar { width: 80px; height: 80px; border-radius: 50%; background: #e50914; display: flex; align-items: center; justify-content: center; font-size: 40px; font-weight: bold; margin: 0 auto 10px auto; }
        .follow-btn { background: #e50914; color: white; padding: 6px 20px; border-radius: 20px; border: none; cursor: pointer; font-size: 12px; }
        .rating-stars { display: inline-flex; gap: 4px; }
        
        .post-card { background: #1f1f1f; border-radius: 16px; padding: 16px; margin-bottom: 16px; }
        .post-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .post-avatar { width: 40px; height: 40px; border-radius: 50%; background: #e50914; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .post-username { font-weight: bold; color: #e50914; cursor: pointer; }
        .post-actions { display: flex; gap: 20px; margin-top: 12px; }
        .post-action { cursor: pointer; display: flex; align-items: center; gap: 6px; color: #888; }
        .comments-section { margin-top: 12px; padding-top: 12px; border-top: 1px solid #333; }

        .comment-avatar { width: 24px; height: 24px; border-radius: 50%; background: #e50914; display: flex; align-items: center; justify-content: center; font-size: 10px; }
        
        .chat-list { position: fixed; bottom: 70px; right: 10px; width: 320px; max-height: 400px; background: #1a1a1a; border-radius: 20px; border: 1px solid #e50914; z-index: 1100; display: none; flex-direction: column; overflow: hidden; }

        .floating-player { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-width: 800px; z-index: 1200; background: #000; border-radius: 12px; overflow: hidden; }
        .floating-player .player-wrapper { padding-bottom: 56.25%; }

        .carousel-container::-webkit-scrollbar { height: 4px; }
        .carousel-track { display: flex; gap: 12px; padding: 4px 0; }
        .carousel-item { flex: 0 0 calc(20% - 10px); min-width: 0; cursor: pointer; position: relative; }

        .content-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        @media (min-width: 640px) { .content-grid { grid-template-columns: repeat(4, 1fr); } }
        @media (min-width: 768px) { .content-grid { grid-template-columns: repeat(5, 1fr); } }
        @media (min-width: 1024px) { .content-grid { grid-template-columns: repeat(6, 1fr); } }

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyAXQ_3yaVR6TgsAha6nU7uihHdd8NvrP78",
            authDomain: "noitefilmes26.firebaseapp.com",
            projectId: "noitefilmes26",
            storageBucket: "noitefilmes26.firebasestorage.app",
            messagingSenderId: "654439850210",
            appId: "1:654439850210:web:6f00af60cde262aafcbebb",
            measurementId: "G-Q9DCCZTQH9"
        };
        
        // Inicializar Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const auth = firebase.auth();
        
        // Variáveis globais
        let currentUser = null;
        let currentUserData = null;
        let filmes = [];
        let currentMedia = null;
        let floatingYtPlayer = null;
        let currentGenreFilter = 'todos';
        let top10List = [];
        let batchPreviewItems = [];
        let isAdminLogged = false;
        let activeChatUserId = null;
        
        // Função auxiliar
        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        function extractYoutubeId(url) {
            if(!url) return null;
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }
        
        function generateSafeId() {
            return Date.now() + '-' + Math.random().toString(36).substring(2, 15);
        }
        
        // ============ FUNÇÕES DE FILMES ============
        function loadFilmesFromFirebase() {
            database.ref('filmes').on('value', (snapshot) => {
                const data = snapshot.val();
                if(data && Object.keys(data).length > 0) {
                    filmes = Object.values(data);
                } else {
                    filmes = [];
                    addDefaultFilmes();
                }
                renderGrid();
                generateWeeklyTop10();
                updateGenreFilters();
            });
        }
        
        function addDefaultFilmes() {
            const defaultFilmes = [
                { id: 'f1', title: 'Premonição', link: 'https://www.youtube.com/watch?v=8iSD9Z4lJm4', thumb: 'https://img.youtube.com/vi/8iSD9Z4lJm4/hqdefault.jpg', category: 'Terror', year: '2000', description: 'Clássico do terror' },
                { id: 'f2', title: 'Predador', link: 'https://www.youtube.com/watch?v=4T8JOK6wY7g', thumb: 'https://img.youtube.com/vi/4T8JOK6wY7g/hqdefault.jpg', category: 'Ação', year: '1987', description: 'Caçada mortal' },
                { id: 'f3', title: 'Interestelar', link: 'https://www.youtube.com/watch?v=zSWdZVtXT7E', thumb: 'https://img.youtube.com/vi/zSWdZVtXT7E/hqdefault.jpg', category: 'Ficção', year: '2014', description: 'Ficção científica' }
            ];
            defaultFilmes.forEach(f => {
                database.ref(`filmes/${f.id}`).set(f);
            });
            filmes = defaultFilmes;
        }
        
        function renderGrid() {
            let items = filmes;
            if(currentGenreFilter !== 'todos') items = items.filter(i => i.category === currentGenreFilter);
            const grid = document.getElementById('contentGrid');
            if(items.length === 0) {
                grid.innerHTML = '<div class="col-span-full text-center py-6 text-gray-500 text-sm">Nenhum filme encontrado</div>';
                return;
            }
            grid.innerHTML = items.map(item => `
                <div class="bg-gray-800 rounded-lg overflow-hidden cursor-pointer card-hover" data-id="${item.id}">
                    <img src="${item.thumb || 'https://via.placeholder.com/300x200'}" class="w-full h-28 object-cover" onerror="this.src='https://via.placeholder.com/300x200'">
                    <div class="p-1">
                        <h3 class="font-semibold text-xs truncate">${item.title}</h3>
                        <p class="text-xs text-gray-400">${item.category || 'Geral'} ${item.year ? `• ${item.year}` : ''}</p>
                    </div>
                </div>
            `).join('');
            document.querySelectorAll('#contentGrid > div').forEach(card => {
                card.addEventListener('click', () => {
                    const id = card.getAttribute('data-id');
                    const item = filmes.find(f => f.id === id);
                    if(item) playMedia(item);
                });
            });

        function playMedia(item) {
            const floatingPlayer = document.getElementById('floatingPlayer');
            const overlay = document.getElementById('floatingPlayerOverlay');
            const videoId = extractYoutubeId(item.link);
            if(!videoId) { showToast('Link inválido'); return; }
            floatingPlayer.classList.remove('hidden');
            overlay.classList.remove('hidden');
            document.getElementById('floatingMediaTitle').innerText = item.title;
            currentMedia = item;
            if(floatingYtPlayer) {
                floatingYtPlayer.loadVideoById(videoId);
                floatingYtPlayer.playVideo();
            } else {
                floatingYtPlayer = new YT.Player('floatingYoutubePlayerDiv', {
                    height: '100%', width: '100%', videoId: videoId,
                    playerVars: { 'autoplay': 1, 'controls': 1, 'modestbranding': 1, 'rel': 0, 'showinfo': 0, 'fs': 1, 'playsinline': 1 },
                    events: { 'onReady': (event) => { event.target.playVideo(); document.getElementById('floatingNoContent').style.display = 'none'; } }
                });
            }
        }
        
        function closeFloatingPlayer() {
            if(floatingYtPlayer) floatingYtPlayer.stopVideo();
            document.getElementById('floatingPlayer').classList.add('hidden');
            document.getElementById('floatingPlayerOverlay').classList.add('hidden');
        }
        
        function generateWeeklyTop10() {
            const allContent = [...filmes.map(f => ({...f, contentType: 'filme'}))];
            if(allContent.length === 0) return;
            const shuffled = [...allContent];
            for(let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            top10List = shuffled.slice(0, 10);
            const track = document.getElementById('top10Track');
            track.innerHTML = top10List.map((item, index) => `
                <div class="carousel-item" data-id="${item.id}">
                    <div class="relative">
                        <div class="rank-number">${index+1}</div>
                        <img src="${item.thumb}" class="poster-front">
                    </div>
                </div>
            `).join('');
            document.querySelectorAll('#top10Track .carousel-item').forEach(el => {
                el.addEventListener('click', () => {
                    const id = el.getAttribute('data-id');
                    const item = filmes.find(f => f.id === id);
                    if(item) playMedia(item);
                });
            });
        }
        
        function updateGenreFilters() {
            const genres = new Set();
            filmes.forEach(item => { if(item.category) genres.add(item.category); });
            let html = '<button data-genre="todos" class="genre-filter px-2 py-0.5 rounded-full bg-gray-800 text-xs genre-filter-active">🎬 Todos</button>';
            Array.from(genres).sort().forEach(genre => {
                html += `<button data-genre="${genre}" class="genre-filter px-2 py-0.5 rounded-full bg-gray-800 text-xs">${genre}</button>`;
            });
            document.getElementById('genreFilters').innerHTML = html;
            document.querySelectorAll('.genre-filter').forEach(btn => {
                if(btn.getAttribute('data-genre') === currentGenreFilter) btn.classList.add('genre-filter-active');
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.genre-filter').forEach(b => b.classList.remove('genre-filter-active'));
                    btn.classList.add('genre-filter-active');
                    currentGenreFilter = btn.getAttribute('data-genre');
                    renderGrid();
                });
            });
        }
        
        // ============ FUNÇÕES DE POSTAGEM ============
        async function createPost(movieId, rating, comment) {
            const movie = filmes.find(f => f.id === movieId);
            if (!movie) return;
            const postId = generateSafeId();
            await database.ref(`posts/${postId}`).set({
                id: postId,
                userId: currentUser.uid,
                username: currentUserData?.nickname || currentUser.email.split('@')[0],
                userAvatar: (currentUserData?.nickname || currentUser.email.split('@')[0]).charAt(0).toUpperCase(),
                movieId: movieId,
                movieTitle: movie.title,
                movieThumb: movie.thumb,
                rating: rating,
                comment: comment,
                likes: 0,
                comments: [],
                timestamp: Date.now()
            });
            showToast(`✅ Avaliação publicada!`);
        }
        
        function renderFeed() {
            const container = document.getElementById('feedContainer');
            database.ref('posts').orderByChild('timestamp').once('value', (snapshot) => {
                const posts = snapshot.val() ? Object.values(snapshot.val()).reverse() : [];
                if (posts.length === 0) {
                    container.innerHTML = '<div class="text-center py-10 text-gray-500">Nenhuma postagem ainda. Avalie um filme!</div>';
                    return;
                }
                container.innerHTML = posts.map(post => `
                    <div class="post-card" data-post-id="${post.id}">
                        <div class="post-header">
                            <div class="post-avatar">${post.userAvatar}</div>
                            <div>
                                <div class="post-username" data-user="${post.userId}">@${post.username}</div>
                                <div class="text-xs text-gray-500">${new Date(post.timestamp).toLocaleString()}</div>
                            </div>
                        </div>
                        <div class="flex gap-2">
                            <img src="${post.movieThumb}" class="w-16 h-24 object-cover rounded">
                            <div>
                                <div class="font-bold">${post.movieTitle}</div>
                                <div class="rating-stars">${renderStars(post.rating)}</div>
                                <div class="text-sm mt-1">${escapeHtml(post.comment || '')}</div>
                            </div>
                        </div>
                        <div class="post-actions">
                            <div class="post-action like-post" data-id="${post.id}"><i class="far fa-heart"></i> <span>${post.likes || 0}</span></div>
                            <div class="post-action comment-post" data-id="${post.id}"><i class="far fa-comment"></i> <span>${post.comments?.length || 0}</span></div>
                        </div>
                        <div class="comments-section hidden" id="comments-${post.id}">
                            ${(post.comments || []).map(c => `
                                <div class="comment">
                                    <div class="comment-avatar">${c.username?.charAt(0).toUpperCase()}</div>
                                    <div><strong>@${c.username}</strong> ${escapeHtml(c.text)}</div>
                                </div>
                            `).join('')}
                            <div class="flex gap-2 mt-2">
                                <input type="text" id="comment-input-${post.id}" class="flex-1 p-1 bg-gray-700 rounded text-sm" placeholder="Escreva um comentário...">
                                <button class="submit-comment bg-red-600 px-2 py-1 rounded text-sm" data-id="${post.id}">Enviar</button>
                            </div>
                        </div>
                    </div>
                `).join('');
                
                document.querySelectorAll('.like-post').forEach(btn => {
                    btn.addEventListener('click', async (e) => {
                        const postId = btn.getAttribute('data-id');
                        const postRef = database.ref(`posts/${postId}`);
                        const snapshot = await postRef.once('value');
                        const post = snapshot.val();
                        if (post) {
                            await postRef.update({ likes: (post.likes || 0) + 1 });
                            showToast('❤️ Curtiu!');
                            renderFeed();
                        }
                    });
                });
                
                document.querySelectorAll('.comment-post').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const postId = btn.getAttribute('data-id');
                        const commentsDiv = document.getElementById(`comments-${postId}`);
                        commentsDiv.classList.toggle('hidden');
                    });
                });
                
                document.querySelectorAll('.submit-comment').forEach(btn => {
                    btn.addEventListener('click', async () => {
                        const postId = btn.getAttribute('data-id');
                        const input = document.getElementById(`comment-input-${postId}`);
                        const text = input.value.trim();
                        if (text && currentUser) {
                            const postRef = database.ref(`posts/${postId}`);
                            const snapshot = await postRef.once('value');
                            const post = snapshot.val();
                            const comments = post.comments || [];
                            comments.push({
                                userId: currentUser.uid,
                                username: currentUserData?.nickname || currentUser.email.split('@')[0],
                                text: text,
                                timestamp: Date.now()
                            });
                            await postRef.update({ comments: comments });
                            input.value = '';
                            showToast('💬 Comentário adicionado!');
                            renderFeed();
                        }
                    });
                });
            });
        }
        
        function renderStars(rating) {
            let stars = '';
            for (let i = 1; i <= 10; i++) {
                stars += `<i class="fas fa-star ${i <= rating ? 'text-yellow-500' : 'text-gray-600'}" style="font-size: 14px;"></i>`;
            }
            return stars;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ============ FUNÇÕES DE CHAT ============
        function loadChatList() {
            if (!currentUser) return;
            database.ref('users').once('value', (snapshot) => {
                const users = snapshot.val();
                const chatItems = document.getElementById('chatListItems');
                chatItems.innerHTML = '';
                for (let uid in users) {
                    if (uid !== currentUser.uid) {
                        const user = users[uid];
                        const isOnline = user.online === true;
                        chatItems.innerHTML += `
                            <div class="chat-item" data-user-id="${uid}">
                                <div class="chat-avatar">${(user.nickname || user.email?.split('@')[0]).charAt(0).toUpperCase()}</div>
                                <div class="flex-1">
                                    <div class="font-bold">@${user.nickname || user.email?.split('@')[0]}</div>
                                    <div class="${isOnline ? 'chat-online' : 'chat-last-seen'}">${isOnline ? '● Online' : 'Offline'}</div>
                                </div>
                            </div>
                        `;
                    }
                }
                document.querySelectorAll('.chat-item').forEach(el => {
                    el.addEventListener('click', () => {
                        const userId = el.getAttribute('data-user-id');
                        openChatWindow(userId);
                        document.getElementById('chatList').classList.remove('open');
                    });
                });
            });
        }
        
        function openChatWindow(otherUserId) {
            activeChatUserId = otherUserId;
            database.ref(`users/${otherUserId}`).once('value', (snapshot) => {
                const user = snapshot.val();
                document.getElementById('chatWindowTitle').innerHTML = `@${user.nickname || user.email?.split('@')[0]}`;
            });
            document.getElementById('chatWindow').classList.add('open');
            loadChatMessages();
        }
        
        function loadChatMessages() {
            if (!currentUser || !activeChatUserId) return;
            const chatId = [currentUser.uid, activeChatUserId].sort().join('_');
            database.ref(`chats/${chatId}`).orderByChild('timestamp').on('value', (snapshot) => {
                const messages = snapshot.val() ? Object.values(snapshot.val()) : [];
                const container = document.getElementById('chatWindowMessages');
                container.innerHTML = messages.map(msg => `
                    <div class="chat-bubble ${msg.senderId === currentUser.uid ? 'my' : 'other'}">
                        <div>${escapeHtml(msg.text)}</div>
                        <div class="text-xs text-gray-400 mt-1">${new Date(msg.timestamp).toLocaleTimeString()}</div>
                    </div>
                `).join('');
                container.scrollTop = container.scrollHeight;
            });
        }
        
        function sendChatMessage() {
            const input = document.getElementById('chatWindowInput');
            const text = input.value.trim();
            if (text && currentUser && activeChatUserId) {
                const chatId = [currentUser.uid, activeChatUserId].sort().join('_');
                database.ref(`chats/${chatId}`).push({
                    senderId: currentUser.uid,
                    text: text,
                    timestamp: Date.now()
                });
                input.value = '';
            }
        }
        
        // ============ CONTROLE DE TELAS ============
        function setScreen(screen) {
            document.getElementById('feedScreen').classList.add('hidden');
            document.getElementById('filmesScreen').classList.add('hidden');
            document.getElementById('perfilScreen').classList.add('hidden');
            if (screen === 'feed') document.getElementById('feedScreen').classList.remove('hidden');
            else if (screen === 'filmes') document.getElementById('filmesScreen').classList.remove('hidden');
            else if (screen === 'perfil') document.getElementById('perfilScreen').classList.remove('hidden');
            document.querySelectorAll('.bottom-menu-item').forEach(item => item.classList.remove('active'));
            if (screen === 'feed') document.getElementById('bottomFeedBtn').classList.add('active');
            else if (screen === 'filmes') document.getElementById('bottomFilmesBtn').classList.add('active');
            else if (screen === 'perfil') document.getElementById('bottomPerfilBtn').classList.add('active');
            if (screen === 'feed' && currentUser) renderFeed();
            if (screen === 'perfil' && currentUser) renderPerfil();
        }
        
        // ============ AUTENTICAÇÃO ============
        async function registerUser() {
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            let nickname = document.getElementById('registerNickname').value.trim();
            const bio = document.getElementById('registerBio').value.trim();
            if(nickname.startsWith('@')) nickname = nickname.substring(1);
            if(!nickname) { showToast('Digite um @nickname'); return; }
            try {
                const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                const user = userCredential.user;
                await database.ref(`users/${user.uid}`).set({
                    email: email,
                    nickname: nickname,
                    bio: bio || 'Cinéfilo apaixonado por filmes!',
                    createdAt: Date.now(),
                    online: true,
                    lastSeen: Date.now(),
                    followers: [],
                    following: []
                });
                showToast(`✅ Cadastro realizado! @${nickname}`);
                document.getElementById('registerForm').classList.add('hidden');
                document.getElementById('loginForm').classList.remove('hidden');
                // Limpar campos
                document.getElementById('registerEmail').value = '';
                document.getElementById('registerPassword').value = '';
                document.getElementById('registerNickname').value = '';
                document.getElementById('registerBio').value = '';
            } catch(error) {
                showToast('Erro: ' + error.message);
            }
        }

            if (!currentUserData) return;
            document.getElementById('settingsModal').classList.remove('hidden');
            document.getElementById('usernameInput').value = currentUserData?.nickname || '';
            document.getElementById('bioInput').value = currentUserData?.bio || '';
            document.getElementById('linkInput').value = currentUserData?.link || '';
        }
        
        async function saveProfile() {
            const newNickname = document.getElementById('usernameInput').value.trim();
            const bio = document.getElementById('bioInput').value.trim();
            const link = document.getElementById('linkInput').value.trim();
            if (newNickname && currentUser) {
                await database.ref(`users/${currentUser.uid}`).update({ 
                    nickname: newNickname, 
                    bio: bio, 
                    link: link 
                });
                currentUserData.nickname = newNickname;
                currentUserData.bio = bio;
                currentUserData.link = link;
                showToast('✅ Perfil atualizado!');
                document.getElementById('settingsModal').classList.add('hidden');
                if (currentScreen === 'perfil') renderPerfil();

        function setDarkMode() { 
            document.body.classList.remove('light-mode'); 
            document.body.classList.add('dark-mode'); 
            localStorage.setItem('theme', 'dark'); 
        }
        function setLightMode() { 
            document.body.classList.remove('dark-mode'); 
            document.body.classList.add('light-mode'); 
            localStorage.setItem('theme', 'light'); 
        }
        function loadTheme() { 
            const theme = localStorage.getItem('theme'); 
            if(theme === 'light') setLightMode(); 
            else setDarkMode(); 
        }

                database.ref(`users/${currentUser.uid}/lastSeen`).set(firebase.database.ServerValue.TIMESTAMP);
                database.ref(`users/${currentUser.uid}/online`).set(true);
                database.ref(`users/${currentUser.uid}/online`).onDisconnect().set(false);

        // ============ ADMIN FUNCTIONS ============
        async function saveSingleItem() {
            const title = document.getElementById('itemTitle').value.trim();
            const link = document.getElementById('itemLink').value.trim();
            const thumb = document.getElementById('itemThumb').value.trim();
            const category = document.getElementById('itemCategory').value.trim();
            const year = document.getElementById('itemYear').value.trim();
            if(!title || !link) { showToast('❌ Preencha título e link'); return; }
            const videoId = extractYoutubeId(link);
            if(!videoId) { showToast('❌ Link inválido'); return; }
            const safeId = generateSafeId();
            await database.ref(`filmes/${safeId}`).set({
                id: safeId, title, link,
                thumb: thumb || `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`,
                category: category || 'Geral',
                year: year || new Date().getFullYear(),
                description: title
            });
            showToast('✅ Filme salvo!');
            resetForm();
        }
        
        async function previewBatch() {
            const links = document.getElementById('batchLinksInput').value.split('\n').filter(l => l.trim() && extractYoutubeId(l.trim()));
            const items = [];
            for(let link of links) {
                const videoId = extractYoutubeId(link.trim());
                if(videoId) {
                    items.push({ title: `Vídeo ${items.length+1}`, link: link.trim(), genre: 'Geral', year: new Date().getFullYear(), thumb: `https://img.youtube.com/vi/${videoId}/hqdefault.jpg` });
                }

            batchPreviewItems = items;
            document.getElementById('batchPreview').innerHTML = items.map(item => `<div class="p-1 border-b border-gray-700 text-xs"><strong>${item.title}</strong></div>`).join('');
        }
        
        async function saveBatch() {
            for(let item of batchPreviewItems) {
                const safeId = generateSafeId();
                await database.ref(`filmes/${safeId}`).set({
                    id: safeId, title: item.title, link: item.link, thumb: item.thumb,
                    category: item.genre, year: item.year, description: item.title
                });
            }
            showToast(`✅ ${batchPreviewItems.length} filmes salvos!`);
            batchPreviewItems = [];
            document.getElementById('batchLinksInput').value = '';
            document.getElementById('batchPreview').innerHTML = '';
            loadFilmesFromFirebase();
        }

            document.getElementById('itemCategory').value = '';

        let currentRatingMovie = null;
        function openRatingModal(movie) {
            currentRatingMovie = movie;
            document.getElementById('ratingModal').classList.remove('hidden');
            document.getElementById('ratingComment').value = '';
            document.querySelectorAll('#ratingStars .star').forEach(star => {
                star.classList.remove('active');
            });
        }
        
        document.querySelectorAll('#ratingStars .star').forEach(star => {
            star.addEventListener('click', () => {
                const value = parseInt(star.getAttribute('data-value'));
                document.querySelectorAll('#ratingStars .star').forEach((s, idx) => {
                    if (idx < value) {

        document.getElementById('floatingPlayerOverlay').onclick = closeFloatingPlayer;
        document.getElementById('rateMovieBtn').onclick = () => { if(currentMedia) openRatingModal(currentMedia); };

            let rating = 0;
            document.querySelectorAll('#ratingStars .star').forEach((s, idx) => { if (s.classList.contains('active')) rating = idx + 1; });
            const comment = document.getElementById('ratingComment').value;
            if (rating === 0) { showToast('Selecione uma nota'); return; }
            await createPost(currentRatingMovie.id, rating, comment);
            document.getElementById('ratingModal').classList.add('hidden');
            currentRatingMovie = null;
            if (currentScreen === 'feed') renderFeed();
        };
        document.getElementById('closeRatingModal').onclick = () => document.getElementById('ratingModal').classList.add('hidden');
        
        document.getElementById('darkModeSettingsBtn').onclick = setDarkMode;
        document.getElementById('lightModeSettingsBtn').onclick = setLightMode;
        document.getElementById('saveProfileBtn').onclick = saveProfile;
        document.getElementById('logoutSettingsBtn').onclick = () => auth.signOut();
        
        document.getElementById('doLogin').onclick = () => {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            auth.signInWithEmailAndPassword(email, password)
                .then(() => {
                    document.getElementById('loginModal').classList.add('hidden');
                    showToast('Login realizado!');
                })
                .catch(e => showToast('Erro: ' + e.message));
        };
        document.getElementById('doRegister').onclick = registerUser;
        document.getElementById('showRegister').onclick = () => {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('registerForm').classList.remove('hidden');
        };
        document.getElementById('showLogin').onclick = () => {
            document.getElementById('registerForm').classList.add('hidden');
            document.getElementById('loginForm').classList.remove('hidden');
        };
        
        document.getElementById('saveItemBtn').onclick = saveSingleItem;
        document.getElementById('cancelEditBtn').onclick = resetForm;
        document.getElementById('previewBatchBtn').onclick = previewBatch;
        document.getElementById('saveBatchBtn').onclick = saveBatch;
        
        const adminModal = document.getElementById('adminModal');
        document.getElementById('adminBtn').onclick = () => {
            adminModal.classList.remove('hidden');
            document.getElementById('adminLoginArea').classList.remove('hidden');
            document.getElementById('adminPanel').classList.add('hidden');
        };
        document.getElementById('closeAdminModal').onclick = () => adminModal.classList.add('hidden');
        document.getElementById('loginAdminBtn').onclick = () => {
            if(document.getElementById('adminPassword').value === 'admin123') {
                isAdminLogged = true;
                document.getElementById('adminLoginArea').classList.add('hidden');
                document.getElementById('adminPanel').classList.remove('hidden');
                refreshAdminLists();
            } else alert('Senha incorreta');
        };
        document.getElementById('adminTabFilmes').onclick = () => {
            document.getElementById('adminFilmesList').classList.remove('hidden');
            document.getElementById('batchFilmesArea').classList.remove('hidden');
        };
        
        // ============ INICIALIZAÇÃO ============
        auth.onAuthStateChanged(async (user) => {
            currentUser = user;
            if (user) {
                // Buscar dados do usuário
                const snapshot = await database.ref(`users/${user.uid}`).once('value');
                currentUserData = snapshot.val();
                
                // Se não existir, criar
                if (!currentUserData) {
                    await database.ref(`users/${user.uid}`).set({
                        email: user.email,
                        nickname: user.email.split('@')[0],
                        bio: 'Cinéfilo apaixonado por filmes!',
                        createdAt: Date.now(),
                        online: true,
                        lastSeen: Date.now(),
                        followers: [],
                        following: []
                    });
                    currentUserData = (await database.ref(`users/${user.uid}`).once('value')).val();
                }
                
                // Fechar modal de login
                document.getElementById('loginModal').classList.add('hidden');
                
                // Carregar dados
                loadFilmesFromFirebase();
                loadChatList();
                updateLastSeen();
                setScreen('filmes');
                
                // Atualizar status periodicamente
                setInterval(() => updateLastSeen(), 30000);
            } else {
                // Usuário não logado - mostrar modal
                document.getElementById('loginModal').classList.remove('hidden');
                currentUserData = null;
                setScreen('filmes');
            }
        });
        
        loadTheme();
        
        // Inicializar YouTube Player vazio
        window.onYouTubeIframeAPIReady = function() {};
    </script>
</body>
</html>
