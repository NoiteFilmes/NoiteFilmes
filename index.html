<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NoiteFilmes - Rede Social para Cinéfilos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.8/dist/hls.min.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: #0a0a0a; overflow-x: hidden; transition: background 0.3s, color 0.3s; }
        
        body.dark-mode { background-color: #0a0a0a; color: #e5e5e5; }
        body.light-mode { background-color: #f5f5f5; color: #1a1a1a; }
        body.light-mode .bg-gray-900 { background-color: #ffffff !important; }
        body.light-mode .bg-gray-800 { background-color: #f0f0f0 !important; }
        body.light-mode .bg-gray-700 { background-color: #e0e0e0 !important; }
        
        .player-wrapper { background: #000; position: relative; padding-bottom: 56.25%; height: 0; }
        .player-wrapper iframe, .player-wrapper video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .card-hover:hover { transform: scale(1.02); transition: 0.2s; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.5); }
        .active-tab { color: #e50914 !important; }
        .like-btn.active { color: #ff4d4d; }
        .save-btn.active { color: #ffd700; }
        .toast { position: fixed; bottom: 20px; right: 20px; background: #333; color: white; padding: 10px 20px; border-radius: 8px; z-index: 1000; animation: fadeOut 3s forwards; }
        @keyframes fadeOut { 0% { opacity: 1; } 70% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }
        
        .logo-line { padding: 8px 12px; border-bottom: 1px solid #222; }
        .menu-container {
            display: flex;
            overflow-x: auto;
            gap: 4px;
            padding: 8px 12px;
            border-bottom: 1px solid #222;
        }
        .nav-item {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            cursor: pointer;
            padding: 4px 10px;
            border-radius: 8px;
            flex-shrink: 0;
        }
        .nav-item i { font-size: 16px; }
        .nav-item span { font-size: 10px; font-weight: 500; }
        .nav-item.active { color: #e50914; }
        
        /* Rating Stars */
        .rating-star {
            cursor: pointer;
            font-size: 20px;
            color: #555;
            transition: 0.2s;
        }
        .rating-star.active { color: #ffc107; }
        
        /* Perfil Modal */
        .profile-modal, .chat-private-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
        }
        .profile-box, .chat-private-box {
            background: #1a1a1a;
            border-radius: 20px;
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
            border: 1px solid #e50914;
        }
        .profile-header {
            text-align: center;
            padding: 20px;
            border-bottom: 1px solid #333;
        }
        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #e50914;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 10px;
            font-size: 40px;
            font-weight: bold;
        }
        .follow-btn {
            background: #e50914;
            color: white;
            padding: 6px 20px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            margin-top: 10px;
        }
        .follow-btn.following { background: #333; }
        
        /* Avaliações */
        .review-card {
            background: #2a2a2a;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 10px;
        }
        .comment-input {
            width: 100%;
            padding: 8px;
            background: #333;
            border: none;
            border-radius: 20px;
            color: white;
            margin-top: 8px;
        }
        
        /* Chat Privado */
        .chat-private-messages {
            height: 400px;
            overflow-y: auto;
            padding: 12px;
        }
        .private-message {
            display: flex;
            margin-bottom: 12px;
        }
        .private-message.my-message { justify-content: flex-end; }
        .private-message .bubble {
            max-width: 70%;
            padding: 8px 12px;
            border-radius: 18px;
            background: #333;
        }
        .private-message.my-message .bubble { background: #e50914; }
        
        .online-status {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-left: 5px;
        }
        .online-status.online { background: #4ade80; }
        .online-status.offline { background: #666; }
        
        .floating-player {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 800px;
            z-index: 1100;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
        }
        .floating-player .player-wrapper { padding-bottom: 56.25%; }
        .floating-player-close {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            border: none;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 10;
        }
        .floating-player-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 1099;
        }
        
        @media (max-width: 768px) {
            .floating-player { width: 95%; }
        }
    </style>
</head>

        <!-- Feed de Avaliações -->

    <!-- Modal de Login -->

                <div id="registerForm" class="hidden">
                    <input type="email" id="registerEmail" class="w-full p-2 bg-gray-800 border border-gray-600 rounded mb-2 text-white" placeholder="Email">
                    <input type="password" id="registerPassword" class="w-full p-2 bg-gray-800 border border-gray-600 rounded mb-2 text-white" placeholder="Senha">
                    <input type="text" id="registerNickname" class="w-full p-2 bg-gray-800 border border-gray-600 rounded mb-2 text-white" placeholder="@nickname">
                    <div id="nicknameSuggestions" class="text-xs text-gray-400 mb-2"></div>

    <!-- Modal de Perfil do Usuário -->
    <div id="profileModal" class="profile-modal hidden">
        <div class="profile-box">
            <div class="profile-header">
                <div class="profile-avatar" id="profileAvatar"></div>
                <h3 id="profileName" class="text-xl font-bold">@username</h3>
                <div class="flex justify-center gap-4 my-2 text-sm">
                    <div><span id="profileFollowers">0</span> seguidores</div>

                <button id="followBtn" class="follow-btn">Seguir</button>
                <button id="chatPrivateBtn" class="ml-2 bg-gray-700 text-white px-4 py-1 rounded-full text-sm">💬 Mensagem</button>

    <!-- Modal de Chat Privado -->
    <div id="chatPrivateModal" class="chat-private-modal hidden">

    <!-- Modal de Avaliação de Filme -->

    <!-- Modal Admin (simplificado) -->
    <div id="adminModal" class="profile-modal hidden">
        <div class="profile-box" style="max-width: 400px;">
            <div class="p-4">
                <h3 class="font-bold text-lg mb-3">Painel Admin</h3>
                <input type="password" id="adminPasswordInput" class="w-full p-2 bg-gray-800 rounded mb-2" placeholder="Senha Admin">
                <button id="loginAdminBtn2" class="w-full bg-red-600 py-2 rounded">Entrar</button>

                    <input type="text" id="adminLink" class="w-full p-2 bg-gray-800 rounded mb-2" placeholder="Link YouTube">
                    <input type="text" id="adminCategory" class="w-full p-2 bg-gray-800 rounded mb-2" placeholder="Gênero">
                    <input type="text" id="adminYear" class="w-full p-2 bg-gray-800 rounded mb-2" placeholder="Ano">
                    <button id="adminSaveFilm" class="w-full bg-green-600 py-2 rounded">Adicionar Filme</button>
                </div>
                <button id="closeAdminModal" class="w-full mt-3 bg-gray-700 py-2 rounded">Fechar</button>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyAXQ_3yaVR6TgsAha6nU7uihHdd8NvrP78",
            authDomain: "noitefilmes26.firebaseapp.com",
            projectId: "noitefilmes26",
            storageBucket: "noitefilmes26.firebasestorage.app",
            messagingSenderId: "654439850210",
            appId: "1:654439850210:web:6f00af60cde262aafcbebb",
            measurementId: "G-Q9DCCZTQH9"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const auth = firebase.auth();
        
        let currentUser = null;
        let currentUserData = null;
        let filmes = [];
        let series = [];
        let usuarios = {};
        let currentFilmRating = null;
        let viewingProfileUser = null;
        let currentPrivateChatWith = null;
        let floatingYtPlayer = null;
        
        // Atualizar status online
        function updateOnlineStatus() {
            if (currentUser) {
                database.ref(`usuarios/${currentUser.uid}/lastSeen`).set({
                    status: 'online',
                    timestamp: Date.now()
                });
                database.ref(`usuarios/${currentUser.uid}/lastSeen`).onDisconnect().set({
                    status: 'offline',
                    timestamp: Date.now()
                });
            }
        }
        
        function getLastSeenText(lastSeen) {
            if (!lastSeen) return 'nunca visto';
            if (lastSeen.status === 'online') return 'online agora';
            const diff = Date.now() - lastSeen.timestamp;
            const minutes = Math.floor(diff / 60000);
            const hours = Math.floor(minutes / 60);
            const days = Math.floor(hours / 24);
            if (minutes < 1) return 'agora mesmo';
            if (minutes < 60) return `visto há ${minutes} min`;
            if (hours < 24) return `visto há ${hours} h`;
            return `visto há ${days} dias`;
        }
        
        // Buscar dados do Firebase
        function loadFilmes() {
            database.ref('filmes').on('value', (snapshot) => {
                const data = snapshot.val();
                filmes = data ? Object.values(data) : [];
                if (currentNavTab === 'filmes') renderGrid();
                generateTop10();
            });
        }
        
        function loadSeries() {
            database.ref('series').on('value', (snapshot) => {
                const data = snapshot.val();
                series = data ? Object.values(data) : [];
                if (currentNavTab === 'series') renderGrid();
            });
        }
        
        function loadUsuarios() {
            database.ref('usuarios').on('value', (snapshot) => {
                usuarios = snapshot.val() || {};
            });
        }
        
        // Avaliações
        async function saveRating(filmId, rating, comment) {
            if (!currentUser) return;
            const reviewId = `${filmId}_${currentUser.uid}`;
            await database.ref(`reviews/${reviewId}`).set({
                filmId: filmId,
                userId: currentUser.uid,
                userNickname: currentUserData?.nickname || currentUser.email.split('@')[0],
                rating: rating,
                comment: comment,
                likes: 0,
                timestamp: Date.now()
            });
            showToast('⭐ Avaliação salva!');
        }
        
        async function loadFilmReviews(filmId, container) {
            const snapshot = await database.ref('reviews').orderByChild('filmId').equalTo(filmId).once('value');
            const reviews = snapshot.val() ? Object.values(snapshot.val()) : [];
            container.innerHTML = reviews.map(r => `
                <div class="review-card">
                    <div class="flex justify-between">
                        <span class="font-bold cursor-pointer text-red-500" onclick="openUserProfile('${r.userId}')">@${r.userNickname}</span>
                        <div class="flex">${'⭐'.repeat(r.rating)}${'☆'.repeat(10-r.rating)}</div>
                    </div>
                    <p class="text-sm mt-1">${escapeHtml(r.comment)}</p>
                    <div class="flex gap-2 mt-2 text-xs text-gray-400">
                        <span>❤️ ${r.likes || 0}</span>
                        <button onclick="likeReview('${r.userId}_${r.filmId}')" class="text-red-500">Curtir</button>
                        <button onclick="replyToReview('${r.userId}')" class="text-blue-500">Responder</button>
                    </div>
                </div>
            `).join('');
        }
        
        function likeReview(reviewId) {
            const reviewRef = database.ref(`reviews/${reviewId}/likes`);
            reviewRef.transaction(current => (current || 0) + 1);
            showToast('❤️ Curtiu avaliação!');
        }
        
        // Feed de avaliações
        async function loadFeed() {
            const snapshot = await database.ref('reviews').orderByChild('timestamp').limitToLast(50).once('value');
            const reviews = snapshot.val() ? Object.values(snapshot.val()).reverse() : [];
            const following = currentUserData?.following || [];
            const feedReviews = following.length > 0 ? reviews.filter(r => following.includes(r.userId)) : reviews.slice(0, 20);
            
            document.getElementById('feedArea').innerHTML = feedReviews.map(r => `
                <div class="bg-gray-800 rounded-xl p-3">
                    <div class="flex justify-between items-start">
                        <div class="flex items-center gap-2">
                            <div class="w-10 h-10 rounded-full bg-red-600 flex items-center justify-center font-bold">${r.userNickname?.charAt(0).toUpperCase()}</div>
                            <div>
                                <div class="font-bold cursor-pointer text-red-500" onclick="openUserProfile('${r.userId}')">@${r.userNickname}</div>
                                <div class="text-xs text-gray-400">${new Date(r.timestamp).toLocaleDateString()}</div>
                            </div>
                        </div>
                        <div class="flex">${'⭐'.repeat(r.rating)}</div>
                    </div>
                    <p class="text-sm mt-2">🎬 <strong>${filmes.find(f => f.id === r.filmId)?.title || 'Filme'}</strong></p>
                    <p class="text-sm mt-1">${escapeHtml(r.comment)}</p>
                    <div class="flex gap-4 mt-2 text-sm text-gray-400">
                        <button onclick="likeReview('${r.userId}_${r.filmId}')" class="hover:text-red-500">❤️ ${r.likes || 0}</button>
                        <button onclick="replyToReview('${r.userId}')" class="hover:text-blue-500">💬 Responder</button>
                    </div>
                </div>
            `).join('');
        }
        
        // Seguir usuário
        async function followUser(userId) {
            if (!currentUser || userId === currentUser.uid) return;
            const following = currentUserData?.following || [];
            if (following.includes(userId)) {
                await database.ref(`usuarios/${currentUser.uid}/following`).set(following.filter(id => id !== userId));
                await database.ref(`usuarios/${userId}/followers`).set((usuarios[userId]?.followers || []).filter(id => id !== currentUser.uid));
                showToast('Deixou de seguir');
            } else {
                following.push(userId);
                await database.ref(`usuarios/${currentUser.uid}/following`).set(following);
                const followers = usuarios[userId]?.followers || [];
                followers.push(currentUser.uid);
                await database.ref(`usuarios/${userId}/followers`).set(followers);
                showToast('✅ Seguindo!');
            }
            loadUserProfile(userId);
        }
        
        // Chat privado
        async function sendPrivateMessage(toUserId, text) {
            if (!text.trim() || !currentUser) return;
            const chatId = [currentUser.uid, toUserId].sort().join('_');
            await database.ref(`private_chats/${chatId}`).push({
                from: currentUser.uid,
                fromName: currentUserData?.nickname,
                text: text,
                timestamp: Date.now()
            });
            document.getElementById('chatPrivateInput').value = '';
            loadPrivateChat(toUserId);
        }
        
        async function loadPrivateChat(withUserId) {
            const chatId = [currentUser.uid, withUserId].sort().join('_');
            const snapshot = await database.ref(`private_chats/${chatId}`).orderByChild('timestamp').once('value');
            const messages = snapshot.val() ? Object.values(snapshot.val()) : [];
            const container = document.getElementById('chatPrivateMessages');
            container.innerHTML = messages.map(m => `
                <div class="private-message ${m.from === currentUser.uid ? 'my-message' : ''}">
                    <div class="bubble">
                        <div class="text-sm">${escapeHtml(m.text)}</div>
                        <div class="text-xs text-gray-400">${new Date(m.timestamp).toLocaleTimeString()}</div>
                    </div>
                </div>
            `).join('');
            container.scrollTop = container.scrollHeight;
        }
        
        function loadUserChats() {
            if (!currentUser) return;
            database.ref('private_chats').on('value', (snapshot) => {
                const chats = snapshot.val() || {};
                const myChats = {};
                Object.keys(chats).forEach(chatId => {
                    if (chatId.includes(currentUser.uid)) {
                        const otherId = chatId.replace(currentUser.uid, '').replace('_', '');
                        const lastMsg = Object.values(chats[chatId]).sort((a,b) => b.timestamp - a.timestamp)[0];
                        if (lastMsg && usuarios[otherId]) {
                            myChats[otherId] = { lastMsg, user: usuarios[otherId] };
                        }
                    }
                });
                document.getElementById('chatsArea').innerHTML = Object.entries(myChats).map(([id, data]) => `
                    <div class="bg-gray-800 rounded-xl p-3 cursor-pointer" onclick="openPrivateChat('${id}')">
                        <div class="flex items-center gap-3">
                            <div class="w-12 h-12 rounded-full bg-red-600 flex items-center justify-center font-bold">${data.user.nickname?.charAt(0).toUpperCase()}</div>
                            <div class="flex-1">
                                <div class="font-bold">@${data.user.nickname}</div>
                                <div class="text-xs text-gray-400 truncate">${data.lastMsg.text.substring(0,40)}</div>
                            </div>
                            <div class="text-xs text-gray-500">${new Date(data.lastMsg.timestamp).toLocaleTimeString()}</div>
                        </div>
                    </div>
                `).join('');
            });
        }
        
        // Abrir perfil de usuário
        async function openUserProfile(userId) {
            viewingProfileUser = userId;
            const userData = usuarios[userId];
            if (!userData) return;
            
            const snapshot = await database.ref('reviews').orderByChild('userId').equalTo(userId).once('value');
            const reviews = snapshot.val() ? Object.values(snapshot.val()) : [];
            const isFollowing = currentUserData?.following?.includes(userId);
            
            document.getElementById('profileAvatar').innerHTML = userData.nickname?.charAt(0).toUpperCase() || '?';
            document.getElementById('profileName').innerHTML = `@${userData.nickname}`;
            document.getElementById('profileFollowers').innerHTML = userData.followers?.length || 0;
            document.getElementById('profileFollowing').innerHTML = userData.following?.length || 0;
            document.getElementById('profileReviews').innerHTML = reviews.length;
            
            const followBtn = document.getElementById('followBtn');
            followBtn.innerHTML = isFollowing ? 'Seguindo' : 'Seguir';
            followBtn.className = `follow-btn ${isFollowing ? 'following' : ''}`;
            followBtn.onclick = () => followUser(userId);
            
            document.getElementById('chatPrivateBtn').onclick = () => openPrivateChat(userId);
            
            document.getElementById('profileReviewsList').innerHTML = reviews.map(r => {
                const filme = filmes.find(f => f.id === r.filmId);
                return `
                    <div class="bg-gray-800 p-2 rounded">
                        <div class="flex justify-between">
                            <span class="font-bold">${filme?.title || 'Filme'}</span>
                            <span>${'⭐'.repeat(r.rating)}</span>
                        </div>
                        <p class="text-sm">${escapeHtml(r.comment.substring(0,100))}</p>
                    </div>
                `;
            }).join('');
            
            document.getElementById('profileModal').classList.remove('hidden');
        }
        
        function openPrivateChat(userId) {
            currentPrivateChatWith = userId;
            const userData = usuarios[userId];
            document.getElementById('chatPrivateTitle').innerHTML = `Chat com @${userData?.nickname}`;
            document.getElementById('chatPrivateModal').classList.remove('hidden');
            loadPrivateChat(userId);
            
            database.ref(`private_chats/${[currentUser.uid, userId].sort().join('_')}`).off();
            database.ref(`private_chats/${[currentUser.uid, userId].sort().join('_')}`).on('child_added', () => {
                loadPrivateChat(userId);
            });
        }
        
        function openRatingModal(film) {
            currentFilmRating = film;
            document.getElementById('ratingMovieTitle').innerHTML = `⭐ Avaliar: ${film.title}`;
            const starsContainer = document.getElementById('ratingStarsContainer');
            starsContainer.innerHTML = '';
            for (let i = 1; i <= 10; i++) {
                const star = document.createElement('i');
                star.className = `fas fa-star rating-star`;
                star.style.fontSize = '28px';
                star.style.margin = '0 4px';
                star.style.cursor = 'pointer';
                star.onclick = () => {
                    document.querySelectorAll('#ratingStarsContainer .rating-star').forEach(s => s.classList.remove('active'));
                    for (let j = 0; j < i; j++) {
                        starsContainer.children[j].classList.add('active');
                    }
                    window.selectedRating = i;
                };
                starsContainer.appendChild(star);
            }
            document.getElementById('ratingModal').classList.remove('hidden');
            window.selectedRating = 0;
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Player e grid
        let currentNavTab = 'filmes';
        let ytPlayer = null;
        
        function playMedia(item, type, rect) {
            const floatingPlayer = document.getElementById('floatingPlayer');
            const overlay = document.getElementById('floatingPlayerOverlay');
            const videoId = extractYoutubeId(item.link);
            if (!videoId) { showToast('Link inválido'); return; }
            
            floatingPlayer.classList.remove('hidden');
            overlay.classList.remove('hidden');
            document.getElementById('floatingMediaTitle').innerHTML = item.title;
            document.getElementById('floatingMediaYear').innerHTML = item.year ? `📅 ${item.year}` : '';
            document.getElementById('floatingMediaGenre').innerHTML = item.category ? `🎭 ${item.category}` : '';
            
            // Botões de avaliação
            const starsDiv = document.getElementById('floatingRatingStars');
            starsDiv.innerHTML = `
                <button onclick="openRatingModal({id:'${item.id}',title:'${item.title.replace(/'/g, "\\'")}'})" class="text-yellow-500 text-sm"><i class="fas fa-star"></i> Avaliar</button>
                <button onclick="shareFilm('${item.id}')" class="text-blue-500 text-sm ml-2"><i class="fas fa-share"></i> Compartilhar</button>
            `;
            
            if (floatingYtPlayer) {
                floatingYtPlayer.loadVideoById(videoId);
                floatingYtPlayer.playVideo();
            } else {
                floatingYtPlayer = new YT.Player('floatingYoutubePlayerDiv', {
                    height: '100%',
                    width: '100%',
                    videoId: videoId,
                    playerVars: { 'autoplay': 1, 'controls': 1, 'modestbranding': 1, 'rel': 0, 'fs': 1, 'playsinline': 1 }
                });
            }
        }
        
        function extractYoutubeId(url) {
            if(!url) return null;
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }
        
        function shareFilm(filmId) {
            const film = filmes.find(f => f.id === filmId);
            if (film) navigator.clipboard.writeText(film.link);
            showToast('Link copiado!');
        }
        
        function renderGrid() {
            const items = currentNavTab === 'filmes' ? filmes : series;
            const grid = document.getElementById('contentGrid');
            if (items.length === 0) { grid.innerHTML = '<div class="col-span-full text-center py-10 text-gray-500">Nenhum conteúdo</div>'; return; }
            grid.innerHTML = items.map(item => `
                <div class="bg-gray-800 rounded-lg overflow-hidden cursor-pointer card-hover" onclick="playMedia({id:'${item.id}',title:'${item.title.replace(/'/g, "\\'")}',link:'${item.link}',year:'${item.year}',category:'${item.category}'}, '${currentNavTab}')">
                    <img src="${item.thumb || 'https://via.placeholder.com/300x200'}" class="w-full h-28 object-cover">
                    <div class="p-1">
                        <h3 class="font-semibold text-xs truncate">${item.title}</h3>
                        <p class="text-xs text-gray-400">${item.category || 'Geral'} ${item.year ? `• ${item.year}` : ''}</p>
                    </div>
                </div>
            `).join('');
        }
        
        function generateTop10() {
            const top = [...filmes].sort(() => Math.random() - 0.5).slice(0, 10);
            // Não precisa de carrossel, apenas manter
        }
        
        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        // Navegação
        function setNavTab(tab) {
            currentNavTab = tab;
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            if (tab === 'filmes') document.getElementById('navFilmesBtn').classList.add('active');
            else if (tab === 'series') document.getElementById('navSeriesBtn').classList.add('active');
            else if (tab === 'feed') document.getElementById('navFeedBtn').classList.add('active');
            else if (tab === 'chats') document.getElementById('navChatsBtn').classList.add('active');
            else if (tab === 'admin') document.getElementById('navAdminBtn').classList.add('active');
            
            document.getElementById('contentGrid').classList.toggle('hidden', tab !== 'filmes' && tab !== 'series');
            document.getElementById('feedArea').classList.toggle('hidden', tab !== 'feed');
            document.getElementById('chatsArea').classList.toggle('hidden', tab !== 'chats');
            
            if (tab === 'filmes') renderGrid();
            if (tab === 'series') renderGrid();
            if (tab === 'feed') loadFeed();
            if (tab === 'chats') loadUserChats();
            if (tab === 'admin') document.getElementById('adminModal').classList.remove('hidden');
        }
        
        // Auth
        async function registerUser() {
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            let nickname = document.getElementById('registerNickname').value.trim();
            if (nickname.startsWith('@')) nickname = nickname.substring(1);
            if (!nickname) { showToast('Digite um @nickname'); return; }
            
            try {
                const userCred = await auth.createUserWithEmailAndPassword(email, password);
                await database.ref(`usuarios/${userCred.user.uid}`).set({
                    nickname: nickname,
                    email: email,
                    followers: [],
                    following: [],
                    createdAt: Date.now()
                });
                showToast(`✅ Bem-vindo @${nickname}`);
            } catch(e) { showToast('Erro: ' + e.message); }
        }
        
        // Admin
        async function adminSaveFilm() {
            const title = document.getElementById('adminTitle').value;
            const link = document.getElementById('adminLink').value;
            const category = document.getElementById('adminCategory').value;
            const year = document.getElementById('adminYear').value;
            if (!title || !link) { showToast('Preencha título e link'); return; }
            const id = Date.now().toString();
            await database.ref(`filmes/${id}`).set({ id, title, link, thumb: `https://img.youtube.com/vi/${extractYoutubeId(link)}/hqdefault.jpg`, category, year });
            showToast('✅ Filme adicionado!');
            document.getElementById('adminTitle').value = '';
            document.getElementById('adminLink').value = '';
            document.getElementById('adminCategory').value = '';
            document.getElementById('adminYear').value = '';
        }
        
        // Event Listeners
        document.getElementById('navFilmesBtn').onclick = () => setNavTab('filmes');
        document.getElementById('navSeriesBtn').onclick = () => setNavTab('series');
        document.getElementById('navFeedBtn').onclick = () => setNavTab('feed');
        document.getElementById('navChatsBtn').onclick = () => setNavTab('chats');
        document.getElementById('navAdminBtn').onclick = () => setNavTab('admin');
        document.getElementById('myProfileBtn').onclick = () => currentUser && openUserProfile(currentUser.uid);
        document.getElementById('searchIcon').onclick = () => alert('🔍 Busca: clique no filme desejado');
        
        document.getElementById('closeFloatingPlayer').onclick = () => {
            document.getElementById('floatingPlayer').classList.add('hidden');
            document.getElementById('floatingPlayerOverlay').classList.add('hidden');
            if (floatingYtPlayer) floatingYtPlayer.stopVideo();
        };
        document.getElementById('floatingPlayerOverlay').onclick = () => document.getElementById('closeFloatingPlayer').click();
        
        document.getElementById('closeProfileModal').onclick = () => document.getElementById('profileModal').classList.add('hidden');
        document.getElementById('closeChatPrivateModal').onclick = () => document.getElementById('chatPrivateModal').classList.add('hidden');
        document.getElementById('sendPrivateMsgBtn').onclick = () => sendPrivateMessage(currentPrivateChatWith, document.getElementById('chatPrivateInput').value);
        document.getElementById('chatPrivateInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendPrivateMessage(currentPrivateChatWith, e.target.value); });
        
        document.getElementById('submitRatingBtn').onclick = async () => {
            if (window.selectedRating && currentFilmRating) {
                await saveRating(currentFilmRating.id, window.selectedRating, document.getElementById('ratingComment').value);
                document.getElementById('ratingModal').classList.add('hidden');
                document.getElementById('ratingComment').value = '';
            } else { showToast('Selecione uma nota'); }
        };
        document.getElementById('closeRatingModal').onclick = () => document.getElementById('ratingModal').classList.add('hidden');
        
        document.getElementById('closeAdminModal').onclick = () => document.getElementById('adminModal').classList.add('hidden');
        document.getElementById('loginAdminBtn2').onclick = () => {
            if (document.getElementById('adminPasswordInput').value === 'admin123') {
                document.getElementById('adminPanelSimple').classList.remove('hidden');
                document.getElementById('adminPasswordInput').style.display = 'none';
                document.getElementById('loginAdminBtn2').style.display = 'none';
            } else { alert('Senha incorreta'); }
        };
        document.getElementById('adminSaveFilm').onclick = adminSaveFilm;
        
        // Auth
        document.getElementById('doLogin').onclick = () => {
            auth.signInWithEmailAndPassword(document.getElementById('loginEmail').value, document.getElementById('loginPassword').value)
                .catch(e => showToast('Erro: ' + e.message));
        };
        document.getElementById('doRegister').onclick = registerUser;
        document.getElementById('showRegister').onclick = () => { document.getElementById('loginForm').classList.add('hidden'); document.getElementById('registerForm').classList.remove('hidden'); };
        document.getElementById('showLogin').onclick = () => { document.getElementById('registerForm').classList.add('hidden'); document.getElementById('loginForm').classList.remove('hidden'); };
        
        auth.onAuthStateChanged(async (user) => {
            currentUser = user;
            if (user) {
                const snapshot = await database.ref(`usuarios/${user.uid}`).once('value');
                currentUserData = snapshot.val();
                if (!currentUserData) {
                    await database.ref(`usuarios/${user.uid}`).set({ nickname: user.email.split('@')[0], followers: [], following: [], createdAt: Date.now() });
                    currentUserData = { nickname: user.email.split('@')[0], followers: [], following: [] };
                }
                document.getElementById('loginModal').classList.add('hidden');
                updateOnlineStatus();
                setInterval(() => updateOnlineStatus(), 30000);
                loadFilmes();
                loadSeries();
                loadUsuarios();
                setNavTab('filmes');
            } else {
                document.getElementById('loginModal').classList.remove('hidden');
            }
        });
        
        if (typeof YT === 'undefined') {
            window.onYouTubeIframeAPIReady = () => {};
        }
        
        // Funções globais para onclick
        window.openUserProfile = openUserProfile;
        window.openPrivateChat = openPrivateChat;
        window.likeReview = likeReview;
        window.replyToReview = (userId) => openPrivateChat(userId);
        window.playMedia = playMedia;
        window.openRatingModal = openRatingModal;
        window.shareFilm = shareFilm;
    </script>
</body>
</html>
