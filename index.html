<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NoiteFilmes - Rede Social para Cinéfilos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.8/dist/hls.min.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: #0a0a0a; overflow-x: hidden; padding-bottom: 70px; }
        
        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #111;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            border-top: 1px solid #222;
            z-index: 100;
        }
        .bottom-nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            color: #666;
            transition: 0.2s;
        }
        .bottom-nav-item.active { color: #e50914; }
        .bottom-nav-item i { font-size: 22px; }
        .bottom-nav-item span { font-size: 10px; }
        
        /* Feed Posts */
        .post-card {
            background: #1a1a1a;
            border-radius: 16px;
            margin-bottom: 16px;
            overflow: hidden;
        }
        .post-header {
            display: flex;
            align-items: center;
            padding: 12px;
            gap: 12px;
        }
        .post-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #e50914;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
        }
        .post-image {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
        }
        .post-actions {
            display: flex;
            gap: 20px;
            padding: 12px;
            border-top: 1px solid #222;
        }
        .post-action-btn {
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .post-action-btn.liked { color: #ff4d4d; }
        .star-rating { display: inline-flex; gap: 4px; margin-left: 10px; }
        .star { color: #ffc107; font-size: 14px; cursor: pointer; }
        .star.empty { color: #444; }
        
        /* Profile Page */
        .profile-header {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            padding: 20px;
            text-align: center;
        }
        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #e50914;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: bold;
            margin: 0 auto 12px;
            border: 3px solid #e50914;
        }
        .follow-btn {
            background: #e50914;
            border: none;
            padding: 8px 24px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            margin-top: 12px;
        }
        .follow-btn.following { background: #333; }
        
        /* Chat Individual */
        .chat-list {
            position: fixed;
            bottom: 0;
            right: 0;
            width: 100%;
            max-width: 400px;
            height: 100%;
            max-height: 600px;
            background: #1a1a1a;
            border-radius: 20px 20px 0 0;
            z-index: 1000;
            transform: translateY(100%);
            transition: 0.3s;
            display: flex;
            flex-direction: column;
        }
        .chat-list.open { transform: translateY(0); }
        .chat-user-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            cursor: pointer;
            border-bottom: 1px solid #333;
        }
        .chat-user-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #e50914;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .online-status { width: 12px; height: 12px; border-radius: 50%; background: #4ade80; }
        .offline-status { background: #666; }
        .last-seen { font-size: 10px; color: #888; }
        
        .chat-window {
            position: fixed;
            bottom: 0;
            right: 0;
            width: 100%;
            max-width: 400px;
            height: 100%;
            max-height: 600px;
            background: #1a1a1a;
            z-index: 1100;
            display: flex;
            flex-direction: column;
            transform: translateY(100%);
            transition: 0.3s;
        }
        .chat-window.open { transform: translateY(0); }
        
        .player-wrapper { background: #000; position: relative; padding-bottom: 56.25%; height: 0; }
        .player-wrapper iframe, .player-wrapper video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        
        .floating-player {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 800px;
            z-index: 1200;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
        }
        .floating-player-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 1199;
        }
        
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            z-index: 2000;
            animation: fadeOut 3s forwards;
        }
        @keyframes fadeOut { 0% { opacity: 1; } 70% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }
        
        .hidden { display: none; }
        
        .rating-select { display: flex; gap: 5px; margin: 10px 0; }
        .rating-star { font-size: 24px; cursor: pointer; color: #444; }
        .rating-star.selected { color: #ffc107; }
    </style>
</head>
<body>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <div class="bottom-nav-item active" data-page="feed">
            <i class="fas fa-home"></i>
            <span>Feed</span>
        </div>
        <div class="bottom-nav-item" data-page="filmes">
            <i class="fas fa-film"></i>
            <span>Filmes</span>
        </div>
        <div class="bottom-nav-item" data-page="perfil">
            <i class="fas fa-user"></i>
            <span>Perfil</span>
        </div>
        <div class="bottom-nav-item" data-page="chat">
            <i class="fas fa-comment-dots"></i>
            <span>Chat</span>
        </div>
    </div>

    <!-- Feed Page -->
    <div id="feedPage" class="page">
        <div class="container mx-auto px-3 py-4" id="feedContainer"></div>
    </div>

    <!-- Filmes Page -->
    <div id="filmesPage" class="page hidden">
        <div class="container mx-auto px-3 py-4">
            <div class="flex gap-2 mb-4 overflow-x-auto">
                <button class="genre-filter px-3 py-1 rounded-full bg-gray-800 text-xs" data-genre="todos">🎬 Todos</button>
            </div>
            <div id="filmesGrid" class="grid grid-cols-3 gap-2"></div>
        </div>
    </div>

    <!-- Perfil Page -->
    <div id="perfilPage" class="page hidden">
        <div id="profileContainer"></div>
    </div>

    <!-- Chat List -->
    <div id="chatList" class="chat-list">
        <div class="p-3 border-b border-gray-700 flex justify-between items-center">
            <span class="font-bold">Mensagens</span>
            <button id="closeChatList" class="text-gray-400"><i class="fas fa-times"></i></button>
        </div>
        <div id="chatUsersList" class="flex-1 overflow-y-auto"></div>
    </div>

    <!-- Chat Window Individual -->
    <div id="chatWindow" class="chat-window">
        <div class="p-3 border-b border-gray-700 flex justify-between items-center">
            <span id="chatWithName" class="font-bold"></span>
            <button id="closeChatWindow" class="text-gray-400"><i class="fas fa-times"></i></button>
        </div>
        <div id="chatMessagesList" class="flex-1 overflow-y-auto p-3"></div>
        <div class="p-3 border-t border-gray-700 flex gap-2">
            <input type="text" id="chatMessageInput" class="flex-1 bg-gray-800 rounded-full px-4 py-2 text-sm" placeholder="Digite uma mensagem...">
            <button id="sendChatMsgBtn" class="bg-red-600 w-10 h-10 rounded-full"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <!-- Floating Player -->
    <div id="floatingPlayerOverlay" class="floating-player-overlay hidden"></div>
    <div id="floatingPlayer" class="floating-player hidden">
        <button id="closeFloatingPlayer" class="absolute top-2 right-2 bg-black/70 w-8 h-8 rounded-full"><i class="fas fa-times"></i></button>
        <div class="player-wrapper"><div id="floatingYoutubePlayerDiv"></div></div>
        <div class="p-2 bg-gray-800"><h3 id="floatingMediaTitle" class="text-sm font-bold"></h3></div>
    </div>

    <!-- Modal de Criar Post -->
    <div id="createPostModal" class="fixed inset-0 bg-black/90 z-50 hidden items-center justify-center p-4">
        <div class="bg-gray-900 rounded-xl w-full max-w-md p-4">
            <h3 class="font-bold mb-3">Avaliar Filme</h3>
            <input type="text" id="postMovieTitle" placeholder="Nome do filme" class="w-full bg-gray-800 rounded-lg p-2 mb-2 text-sm">
            <textarea id="postReview" placeholder="Sua avaliação..." rows="3" class="w-full bg-gray-800 rounded-lg p-2 mb-2 text-sm"></textarea>
            <div class="rating-select mb-3" id="ratingStars">
                <span class="rating-star" data-value="1">☆</span><span class="rating-star" data-value="2">☆</span>
                <span class="rating-star" data-value="3">☆</span><span class="rating-star" data-value="4">☆</span>
                <span class="rating-star" data-value="5">☆</span><span class="rating-star" data-value="6">☆</span>
                <span class="rating-star" data-value="7">☆</span><span class="rating-star" data-value="8">☆</span>
                <span class="rating-star" data-value="9">☆</span><span class="rating-star" data-value="10">★</span>
            </div>
            <div class="flex gap-2">
                <button id="submitPostBtn" class="bg-red-600 flex-1 py-2 rounded-lg">Publicar</button>
                <button id="cancelPostBtn" class="bg-gray-700 flex-1 py-2 rounded-lg">Cancelar</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAXQ_3yaVR6TgsAha6nU7uihHdd8NvrP78",
            authDomain: "noitefilmes26.firebaseapp.com",
            projectId: "noitefilmes26",
            storageBucket: "noitefilmes26.firebasestorage.app",
            messagingSenderId: "654439850210",
            appId: "1:654439850210:web:6f00af60cde262aafcbebb"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const auth = firebase.auth();
        
        let currentUser = null;
        let currentUserData = null;
        let filmes = [];
        let posts = [];
        let users = {};
        let selectedRating = 0;
        let currentChatWith = null;
        let onlineStatusInterval = null;
        
        // Carregar filmes do Firebase
        function loadFilmes() {
            database.ref('filmes').on('value', (snapshot) => {
                const data = snapshot.val();
                if(data) filmes = Object.values(data);
                renderFilmesGrid();
            });
        }
        
        // Carregar posts do feed
        function loadPosts() {
            database.ref('posts').orderByChild('createdAt').on('value', (snapshot) => {
                const data = snapshot.val();
                posts = data ? Object.values(data).reverse() : [];
                renderFeed();
            });
        }
        
        // Carregar usuários
        function loadUsers() {
            database.ref('usuarios').on('value', (snapshot) => {
                users = snapshot.val() || {};
                renderFeed();
                renderChatUsersList();
                renderProfile();
            });
        }
        
        // Renderizar Feed
        function renderFeed() {
            const container = document.getElementById('feedContainer');
            if(!container) return;
            
            if(posts.length === 0) {
                container.innerHTML = '<div class="text-center text-gray-500 py-10">Nenhuma publicação. Faça sua primeira avaliação!</div>';
                return;
            }
            
            container.innerHTML = posts.map(post => {
                const user = users[post.userId] || { nickname: 'Usuário', avatar: '👤' };
                const isLiked = post.likes && post.likes[currentUser?.uid];
                const likeCount = post.likes ? Object.keys(post.likes).length : 0;
                const commentCount = post.comments ? Object.keys(post.comments).length : 0;
                const userRating = post.userRating || 0;
                
                return `
                    <div class="post-card" data-post-id="${post.id}">
                        <div class="post-header">
                            <div class="post-avatar">${user.avatar || user.nickname?.charAt(0).toUpperCase() || '👤'}</div>
                            <div>
                                <div class="font-bold">@${user.nickname || 'usuário'}</div>
                                <div class="text-xs text-gray-500">${new Date(post.createdAt).toLocaleString()}</div>
                            </div>
                        </div>
                        <div class="px-3 pb-2">
                            <div class="font-semibold">🎬 ${post.movieTitle}</div>
                            <div class="star-rating mt-1">${renderStars(userRating)}</div>
                            <p class="text-sm mt-2">${post.review || ''}</p>
                        </div>
                        <div class="post-actions">
                            <button class="post-action-btn like-btn ${isLiked ? 'liked' : ''}" data-post-id="${post.id}">
                                <i class="fas fa-heart"></i> <span>${likeCount}</span>
                            </button>
                            <button class="post-action-btn comment-btn" data-post-id="${post.id}">
                                <i class="fas fa-comment"></i> <span>${commentCount}</span>
                            </button>
                            <button class="post-action-btn share-btn" data-post-id="${post.id}">
                                <i class="fas fa-share-alt"></i>
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
            
            // Adicionar eventos
            document.querySelectorAll('.like-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const postId = btn.dataset.postId;
                    toggleLike(postId);
                });
            });
            
            document.querySelectorAll('.comment-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const postId = btn.dataset.postId;
                    showCommentModal(postId);
                });
            });
        }
        
        function renderStars(rating) {
            let stars = '';
            for(let i=1; i<=10; i++) {
                stars += `<span class="star ${i <= rating ? '' : 'empty'}">★</span>`;
            }
            return stars;
        }
        
        async function toggleLike(postId) {
            if(!currentUser) { showToast('Faça login primeiro'); return; }
            const postRef = database.ref(`posts/${postId}/likes/${currentUser.uid}`);
            const snapshot = await postRef.once('value');
            if(snapshot.exists()) {
                await postRef.remove();
                showToast('👍 Like removido');
            } else {
                await postRef.set(true);
                showToast('❤️ Curtiu!');
            }
        }
        
        function showCommentModal(postId) {
            const comment = prompt('Digite seu comentário:');
            if(comment && comment.trim()) {
                const commentId = Date.now();
                database.ref(`posts/${postId}/comments/${commentId}`).set({
                    userId: currentUser.uid,
                    username: currentUserData?.nickname || 'Usuário',
                    text: comment,
                    createdAt: Date.now()
                });
                showToast('💬 Comentário adicionado!');
            }
        }
        
        // Criar novo post
        async function createPost() {
            const movieTitle = document.getElementById('postMovieTitle').value.trim();
            const review = document.getElementById('postReview').value.trim();
            
            if(!movieTitle) { showToast('Digite o nome do filme'); return; }
            if(selectedRating === 0) { showToast('Dê uma nota de 1 a 10'); return; }
            
            const newPost = {
                id: Date.now(),
                userId: currentUser.uid,
                movieTitle: movieTitle,
                review: review,
                userRating: selectedRating,
                likes: {},
                comments: {},
                createdAt: Date.now()
            };
            
            await database.ref(`posts/${newPost.id}`).set(newPost);
            showToast('✅ Post publicado!');
            document.getElementById('createPostModal').classList.add('hidden');
            document.getElementById('postMovieTitle').value = '';
            document.getElementById('postReview').value = '';
            selectedRating = 0;
            updateRatingStars(0);
        }
        
        function updateRatingStars(rating) {
            const stars = document.querySelectorAll('#ratingStars .rating-star');
            stars.forEach((star, idx) => {
                if(idx < rating) star.innerHTML = '★';
                else star.innerHTML = '☆';
            });
        }
        
        // Renderizar filmes
        function renderFilmesGrid() {
            const grid = document.getElementById('filmesGrid');
            if(!grid) return;
            if(filmes.length === 0) {
                grid.innerHTML = '<div class="col-span-full text-center text-gray-500 py-10">Nenhum filme disponível</div>';
                return;
            }
            grid.innerHTML = filmes.map(filme => `
                <div class="bg-gray-800 rounded-lg overflow-hidden cursor-pointer" data-filme='${JSON.stringify(filme)}'>
                    <img src="${filme.thumb}" class="w-full h-32 object-cover" onerror="this.src='https://via.placeholder.com/150x200'">
                    <div class="p-1 text-center text-xs truncate">${filme.title}</div>
                </div>
            `).join('');
            
            document.querySelectorAll('#filmesGrid > div').forEach(card => {
                card.addEventListener('click', () => {
                    const filme = JSON.parse(card.dataset.filme);
                    playFloatingMovie(filme);
                });
            });
        }
        
        function playFloatingMovie(filme) {
            const videoId = extractYoutubeId(filme.link);
            if(!videoId) return;
            document.getElementById('floatingPlayer').classList.remove('hidden');
            document.getElementById('floatingPlayerOverlay').classList.remove('hidden');
            document.getElementById('floatingMediaTitle').innerText = filme.title;
            
            if(window.floatingPlayer) {
                window.floatingPlayer.loadVideoById(videoId);
            } else {
                window.floatingPlayer = new YT.Player('floatingYoutubePlayerDiv', {
                    height: '100%',
                    width: '100%',
                    videoId: videoId,
                    playerVars: { autoplay: 1, controls: 1 }
                });
            }
        }
        
        function extractYoutubeId(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }
        
        // Renderizar Perfil
        function renderProfile() {
            if(!currentUser || !currentUserData) return;
            const container = document.getElementById('profileContainer');
            const userPosts = posts.filter(p => p.userId === currentUser.uid);
            const followerCount = currentUserData.followers ? Object.keys(currentUserData.followers).length : 0;
            const followingCount = currentUserData.following ? Object.keys(currentUserData.following).length : 0;
            
            container.innerHTML = `
                <div class="profile-header">
                    <div class="profile-avatar">${currentUserData.avatar || currentUserData.nickname?.charAt(0).toUpperCase() || '👤'}</div>
                    <div class="text-xl font-bold">@${currentUserData.nickname || 'usuário'}</div>
                    <div class="text-sm text-gray-400">${currentUserData.bio || 'Cinéfilo apaixonado por filmes! 🎬'}</div>
                    <div class="flex justify-center gap-6 mt-3">
                        <div><span class="font-bold">${followerCount}</span> <span class="text-xs">seguidores</span></div>
                        <div><span class="font-bold">${followingCount}</span> <span class="text-xs">seguindo</span></div>
                        <div><span class="font-bold">${userPosts.length}</span> <span class="text-xs">publicações</span></div>
                    </div>
                    <button id="editProfileBtn" class="bg-gray-700 px-4 py-1 rounded-full text-sm mt-3">Editar perfil</button>
                </div>
                <div class="p-3">
                    <h3 class="font-bold mb-2">⭐ Minhas Avaliações</h3>
                    ${userPosts.length === 0 ? '<p class="text-gray-500 text-sm">Nenhuma avaliação ainda</p>' : ''}
                    ${userPosts.map(post => `
                        <div class="bg-gray-800 rounded-lg p-3 mb-2">
                            <div class="font-semibold">🎬 ${post.movieTitle}</div>
                            <div class="star-rating">${renderStars(post.userRating)}</div>
                            <p class="text-sm mt-1">${post.review || ''}</p>
                        </div>
                    `).join('')}
                </div>
            `;
            
            document.getElementById('editProfileBtn')?.addEventListener('click', () => {
                const newBio = prompt('Digite sua biografia:', currentUserData.bio || '');
                if(newBio !== null) {
                    database.ref(`usuarios/${currentUser.uid}/bio`).set(newBio);
                    showToast('✅ Biografia atualizada!');
                }
            });
        }
        
        // Chat Individual
        function renderChatUsersList() {
            const container = document.getElementById('chatUsersList');
            if(!container) return;
            const otherUsers = Object.entries(users).filter(([id]) => id !== currentUser?.uid);
            container.innerHTML = otherUsers.map(([id, user]) => `
                <div class="chat-user-item" data-user-id="${id}" data-user-name="${user.nickname}">
                    <div class="chat-user-avatar">${user.avatar || user.nickname?.charAt(0).toUpperCase() || '👤'}</div>
                    <div class="flex-1">
                        <div class="font-semibold">@${user.nickname}</div>
                        <div class="text-xs text-gray-400">${user.lastSeen ? formatLastSeen(user.lastSeen) : 'Online agora'}</div>
                    </div>
                    <div class="${user.online ? 'online-status' : 'offline-status'} w-2 h-2 rounded-full"></div>
                </div>
            `).join('');
            
            document.querySelectorAll('.chat-user-item').forEach(el => {
                el.addEventListener('click', () => {
                    const userId = el.dataset.userId;
                    const userName = el.dataset.userName;
                    openChatWindow(userId, userName);
                });
            });
        }
        
        function formatLastSeen(timestamp) {
            const diff = Date.now() - timestamp;
            const minutes = Math.floor(diff / 60000);
            if(minutes < 1) return 'online agora';
            if(minutes < 60) return `visto há ${minutes} min`;
            const hours = Math.floor(minutes / 60);
            if(hours < 24) return `visto há ${hours} h`;
            const days = Math.floor(hours / 24);
            return `visto há ${days} dia(s)`;
        }
        
        function openChatWindow(userId, userName) {
            currentChatWith = userId;
            document.getElementById('chatWithName').innerText = `@${userName}`;
            document.getElementById('chatWindow').classList.add('open');
            loadChatMessages(userId);
        }
        
        function loadChatMessages(userId) {
            const chatId = [currentUser.uid, userId].sort().join('_');
            database.ref(`chats/${chatId}`).orderByChild('createdAt').on('value', (snapshot) => {
                const messages = snapshot.val();
                const container = document.getElementById('chatMessagesList');
                if(!messages) {
                    container.innerHTML = '<div class="text-center text-gray-500">Nenhuma mensagem ainda</div>';
                    return;
                }
                const messagesList = Object.values(messages);
                container.innerHTML = messagesList.map(msg => `
                    <div class="${msg.from === currentUser.uid ? 'text-right' : 'text-left'} mb-2">
                        <div class="inline-block max-w-[70%] ${msg.from === currentUser.uid ? 'bg-red-600' : 'bg-gray-700'} rounded-lg px-3 py-2 text-sm">
                            ${msg.text}
                        </div>
                        <div class="text-xs text-gray-500 mt-1">${new Date(msg.createdAt).toLocaleTimeString()}</div>
                    </div>
                `).join('');
                container.scrollTop = container.scrollHeight;
            });
        }
        
        function sendChatMessage() {
            const input = document.getElementById('chatMessageInput');
            const text = input.value.trim();
            if(!text || !currentChatWith) return;
            const chatId = [currentUser.uid, currentChatWith].sort().join('_');
            database.ref(`chats/${chatId}`).push({
                from: currentUser.uid,
                to: currentChatWith,
                text: text,
                createdAt: Date.now()
            });
            input.value = '';
        }
        
        // Atualizar online status
        function updateOnlineStatus() {
            if(currentUser) {
                database.ref(`usuarios/${currentUser.uid}/online`).set(true);
                database.ref(`usuarios/${currentUser.uid}/lastSeen`).set(Date.now());
                database.ref(`usuarios/${currentUser.uid}/onDisconnect`).set({ online: false, lastSeen: Date.now() });
            }
        }
        
        // Navegação
        function navigateTo(page) {
            document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
            document.getElementById(`${page}Page`).classList.remove('hidden');
            document.querySelectorAll('.bottom-nav-item').forEach(item => item.classList.remove('active'));
            document.querySelector(`.bottom-nav-item[data-page="${page}"]`).classList.add('active');
            
            if(page === 'feed') renderFeed();
            if(page === 'filmes') renderFilmesGrid();
            if(page === 'perfil') renderProfile();
            if(page === 'chat') document.getElementById('chatList').classList.add('open');
        }
        
        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        // Event Listeners
        document.querySelectorAll('.bottom-nav-item').forEach(item => {
            item.addEventListener('click', () => navigateTo(item.dataset.page));
        });
        
        document.getElementById('closeChatList')?.addEventListener('click', () => {
            document.getElementById('chatList').classList.remove('open');
            navigateTo('feed');
        });
        
        document.getElementById('closeChatWindow')?.addEventListener('click', () => {
            document.getElementById('chatWindow').classList.remove('open');
        });
        
        document.getElementById('sendChatMsgBtn')?.addEventListener('click', sendChatMessage);
        document.getElementById('chatMessageInput')?.addEventListener('keypress', (e) => {
            if(e.key === 'Enter') sendChatMessage();
        });
        
        document.getElementById('closeFloatingPlayer')?.addEventListener('click', () => {
            document.getElementById('floatingPlayer').classList.add('hidden');
            document.getElementById('floatingPlayerOverlay').classList.add('hidden');
            if(window.floatingPlayer) window.floatingPlayer.stopVideo();
        });
        
        document.getElementById('floatingPlayerOverlay')?.addEventListener('click', () => {
            document.getElementById('floatingPlayer').classList.add('hidden');
            document.getElementById('floatingPlayerOverlay').classList.add('hidden');
            if(window.floatingPlayer) window.floatingPlayer.stopVideo();
        });
        
        // Stars rating
        document.querySelectorAll('#ratingStars .rating-star').forEach(star => {
            star.addEventListener('click', () => {
                selectedRating = parseInt(star.dataset.value);
                updateRatingStars(selectedRating);
            });
        });
        
        document.getElementById('submitPostBtn')?.addEventListener('click', createPost);
        document.getElementById('cancelPostBtn')?.addEventListener('click', () => {
            document.getElementById('createPostModal').classList.add('hidden');
        });
        
        // Botão flutuante para criar post no feed
        const addPostBtn = document.createElement('button');
        addPostBtn.innerHTML = '<i class="fas fa-plus"></i>';
        addPostBtn.className = 'fixed bottom-20 right-4 bg-red-600 w-14 h-14 rounded-full shadow-lg z-50 text-2xl';
        addPostBtn.addEventListener('click', () => {
            if(currentUser) document.getElementById('createPostModal').classList.remove('hidden');
            else showToast('Faça login primeiro');
        });
        document.body.appendChild(addPostBtn);
        
        // Autenticação
        auth.onAuthStateChanged(async (user) => {
            if(user) {
                currentUser = user;
                const snapshot = await database.ref(`usuarios/${user.uid}`).once('value');
                if(snapshot.exists()) {
                    currentUserData = snapshot.val();
                } else {
                    const nickname = prompt('Digite seu @nickname (ex: joaofilmes):');
                    if(nickname) {
                        currentUserData = {
                            nickname: nickname,
                            avatar: nickname.charAt(0).toUpperCase(),
                            bio: 'Cinéfilo apaixonado por filmes! 🎬',
                            followers: {},
                            following: {},
                            createdAt: Date.now()
                        };
                        await database.ref(`usuarios/${user.uid}`).set(currentUserData);
                    }
                }
                loadFilmes();
                loadPosts();
                loadUsers();
                updateOnlineStatus();
                setInterval(updateOnlineStatus, 30000);
                navigateTo('feed');
            } else {
                const email = prompt('Faça login ou cadastre-se:\nDigite seu email:');
                if(email) {
                    const password = prompt('Digite sua senha:');
                    try {
                        await auth.signInWithEmailAndPassword(email, password);
                    } catch(e) {
                        if(e.code === 'auth/user-not-found') {
                            const newPassword = prompt('Usuário não encontrado. Crie uma senha:');
                            if(newPassword) {
                                await auth.createUserWithEmailAndPassword(email, newPassword);
                            }
                        }
                    }
                }
            }
        });
        
        // Inicializar YouTube API
        function onYouTubeIframeAPIReady() {}
        if(typeof YT === 'undefined') {
            window.onYouTubeIframeAPIReady = onYouTubeIframeAPIReady;
        }
    </script>
</body>
</html>
